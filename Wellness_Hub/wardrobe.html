<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W-OS // DIGITAL_WARDROBE</title>
    <style>
        :root {
            /* Body Branch Palette */
            --bg-dark: #010a0f;
            --neon-primary: #00e5ff; 
            --neon-glow: #80f2ff;
            --text-primary: #e0faff; 
            --text-dim: #4da6b3;
            --neon-warn: #f39c12;
            --neon-red: #ff2a2a;
            --font-main: 'Courier New', Courier, monospace;
        }

        body { 
            font-family: var(--font-main); background-color: var(--bg-dark); color: var(--text-primary); 
            margin: 0; padding: 20px; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
            box-sizing: border-box;
            background-image: 
                linear-gradient(rgba(0, 229, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        header { padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--neon-primary); background: rgba(0,0,0,0.8); flex-shrink: 0;}
        header h1 { margin: 0; font-size: 1.2rem; letter-spacing: 3px; color: var(--neon-primary); text-shadow: 0 0 10px var(--neon-primary); text-transform: uppercase; }
        .btn-return { background: none; border: 2px solid var(--neon-primary); color: var(--neon-primary); padding: 5px 15px; cursor: pointer; font-size: 0.8rem; font-weight: bold; border-radius: 5px; transition: 0.3s; text-transform: uppercase;}
        .btn-return:hover { background: var(--neon-primary); color: black; box-shadow: 0 0 15px var(--neon-primary); }

        .layout-grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; min-height: 0; padding-top: 20px; }

        /* Panels */
        .panel { 
            background: rgba(0, 10, 15, 0.9); border: 1px solid var(--text-dim); 
            border-radius: 10px; display: flex; flex-direction: column; overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
        .panel-header { 
            background: rgba(0, 229, 255, 0.1); border-bottom: 1px solid var(--neon-primary); 
            padding: 10px; font-weight: bold; text-align: center; letter-spacing: 2px; color: var(--neon-glow);
        }

        /* Column 1: Inventory */
        .inventory-filters { display: flex; gap: 5px; padding: 10px; border-bottom: 1px dashed var(--text-dim); overflow-x: auto; }
        .filter-btn { background: #000; border: 1px solid var(--text-dim); color: var(--text-dim); padding: 5px 10px; cursor: pointer; font-size: 0.7rem; border-radius: 15px; }
        .filter-btn.active { background: var(--neon-primary); color: #000; font-weight: bold; border-color: var(--neon-primary); box-shadow: 0 0 10px var(--neon-primary); }
        
        .inventory-grid { flex: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; align-content: flex-start; }
        .inv-item { 
            background: #000; border: 1px solid var(--text-dim); border-radius: 5px; padding: 5px; 
            cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .inv-item:hover { border-color: var(--neon-primary); box-shadow: 0 0 10px rgba(0, 229, 255, 0.3); transform: scale(1.05); }
        .inv-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 3px; background: #111; }
        .inv-name { font-size: 0.6rem; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }

        .btn-add { background: transparent; border: none; border-top: 1px solid var(--neon-primary); color: var(--neon-primary); padding: 15px; font-weight: bold; cursor: pointer; transition: 0.3s; letter-spacing: 2px;}
        .btn-add:hover { background: rgba(0, 229, 255, 0.2); }

        /* Column 2: Mannequin */
        .mannequin-zone { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; gap: 10px; overflow-y: auto; background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,229,255,0.03) 10px, rgba(0,229,255,0.03) 20px); }
        
        .slot { 
            width: 120px; height: 120px; border: 2px dashed var(--text-dim); border-radius: 10px; 
            display: flex; justify-content: center; align-items: center; position: relative;
            background: rgba(0,0,0,0.5); color: var(--text-dim); font-size: 0.8rem; font-weight: bold; letter-spacing: 1px;
            transition: 0.3s;
        }
        .slot.filled { border-style: solid; border-color: var(--neon-primary); box-shadow: 0 0 15px rgba(0, 229, 255, 0.2); color: transparent; }
        .slot-img { position: absolute; width: 90%; height: 90%; object-fit: contain; z-index: 2; pointer-events: none; }
        .slot-clear { position: absolute; top: -5px; right: -5px; background: var(--neon-red); color: #fff; width: 20px; height: 20px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 0.7rem; cursor: pointer; z-index: 10; border: none; display: none;}
        .slot.filled .slot-clear { display: flex; }

        .outfit-controls { display: flex; gap: 10px; padding: 15px; border-top: 1px solid var(--text-dim); }
        .outfit-name { flex: 1; background: #000; border: 1px solid var(--text-dim); color: #fff; padding: 10px; font-family: inherit; outline: none; }
        .outfit-name:focus { border-color: var(--neon-primary); }
        .btn-save { background: var(--neon-primary); color: #000; border: none; padding: 0 20px; font-weight: bold; cursor: pointer; border-radius: 3px; }

        /* Column 3: Lookbook */
        .lookbook-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 15px; }
        .outfit-card { border: 1px solid var(--text-dim); background: #000; padding: 10px; border-radius: 5px; position: relative;}
        .outfit-card-title { color: var(--neon-glow); font-weight: bold; margin-bottom: 10px; font-size: 0.9rem; border-bottom: 1px dashed var(--text-dim); padding-bottom: 5px;}
        .outfit-preview { display: flex; gap: 5px; flex-wrap: wrap; }
        .outfit-thumb { width: 40px; height: 40px; object-fit: cover; border: 1px solid #333; border-radius: 3px; }
        .btn-equip { background: transparent; border: 1px solid var(--neon-primary); color: var(--neon-primary); width: 100%; margin-top: 10px; padding: 5px; cursor: pointer; font-family: inherit; font-size: 0.7rem;}
        .btn-equip:hover { background: var(--neon-primary); color: #000; }
        .btn-delete { position: absolute; top: 10px; right: 10px; background: none; border: none; color: var(--neon-red); cursor: pointer; }

        /* Modal Overlay for Adding Item */
        #addModal { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 100; display: none; justify-content: center; align-items: center; }
        .modal-box { background: #010a0f; border: 2px solid var(--neon-primary); padding: 25px; border-radius: 10px; width: 300px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 0 30px rgba(0, 229, 255, 0.2); }
        .modal-box h3 { margin: 0; color: var(--neon-glow); text-align: center; }
        .modal-input { background: #000; border: 1px solid var(--text-dim); color: #fff; padding: 10px; font-family: inherit; width: 100%; box-sizing: border-box; outline: none;}
        .modal-input:focus { border-color: var(--neon-primary); }
        .preview-box { width: 100%; height: 200px; border: 1px dashed var(--text-dim); display: flex; justify-content: center; align-items: center; background: #000; overflow: hidden; position: relative;}
        #uploadPreview { max-width: 100%; max-height: 100%; display: none; }
        
        .file-upload-btn { background: #111; border: 1px solid var(--neon-primary); color: var(--neon-primary); padding: 10px; text-align: center; cursor: pointer; font-weight: bold; }
        input[type="file"] { display: none; }

        .modal-actions { display: flex; gap: 10px; margin-top: 10px; }
        .modal-btn { flex: 1; padding: 10px; border: none; cursor: pointer; font-family: inherit; font-weight: bold; }
        .modal-cancel { background: #333; color: #fff; }
        .modal-save { background: var(--neon-primary); color: #000; }

        ::-webkit-scrollbar { width: 5px; height: 5px;}
        ::-webkit-scrollbar-thumb { background: var(--text-dim); }
    </style>
</head>
<body>

<header>
    <h1>SYS_BODY // DIGITAL_WARDROBE</h1>
    <button class="btn-return" onclick="window.parent.closeApp()">◄ TERMINATE</button>
</header>

<div class="layout-grid">
    
    <div class="panel">
        <div class="panel-header">CLOSET_DATABASE</div>
        <div class="inventory-filters">
            <button class="filter-btn active" onclick="filterInv('all', this)">ALL</button>
            <button class="filter-btn" onclick="filterInv('head', this)">HEAD</button>
            <button class="filter-btn" onclick="filterInv('torso', this)">TORSO</button>
            <button class="filter-btn" onclick="filterInv('legs', this)">LEGS</button>
            <button class="filter-btn" onclick="filterInv('feet', this)">FEET</button>
            <button class="filter-btn" onclick="filterInv('acc', this)">ACC</button>
        </div>
        <div class="inventory-grid" id="invGrid">
            </div>
        <button class="btn-add" onclick="openAddModal()">+ ACQUIRE_ASSET</button>
    </div>

    <div class="panel">
        <div class="panel-header">NEURAL_MANNEQUIN</div>
        <div class="mannequin-zone">
            
            <div style="position: relative; display: flex; justify-content: center; width: 100%;">
                <div class="slot" id="slot-head" ondrop="drop(event)" ondragover="allowDrop(event)">
                    HEAD
                    <img src="" class="slot-img" id="img-head">
                    <button class="slot-clear" onclick="clearSlot('head')">X</button>
                </div>
                
                <div class="slot" id="slot-acc" ondrop="drop(event)" ondragover="allowDrop(event)" style="position: absolute; left: calc(50% + 70px); top: 20px; width: 80px; height: 80px;">
                    ACC
                    <img src="" class="slot-img" id="img-acc">
                    <button class="slot-clear" onclick="clearSlot('acc')">X</button>
                </div>
            </div>
            
            <div class="slot" id="slot-torso" ondrop="drop(event)" ondragover="allowDrop(event)">
                TORSO
                <img src="" class="slot-img" id="img-torso">
                <button class="slot-clear" onclick="clearSlot('torso')">X</button>
            </div>
            
            <div class="slot" id="slot-legs" ondrop="drop(event)" ondragover="allowDrop(event)">
                LEGS
                <img src="" class="slot-img" id="img-legs">
                <button class="slot-clear" onclick="clearSlot('legs')">X</button>
            </div>
            
            <div class="slot" id="slot-feet" ondrop="drop(event)" ondragover="allowDrop(event)">
                FEET
                <img src="" class="slot-img" id="img-feet">
                <button class="slot-clear" onclick="clearSlot('feet')">X</button>
            </div>

        </div>
        <div class="outfit-controls">
            <input type="text" class="outfit-name" id="outfitNameInput" placeholder="OUTFIT_DESIGNATION...">
            <button class="btn-save" onclick="saveOutfit()">SAVE</button>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header">ARCHIVED_LOOKBOOK</div>
        <div class="lookbook-list" id="lookbookList">
            </div>
    </div>

</div>

<div id="addModal">
    <div class="modal-box">
        <h3>ACQUIRE_ASSET</h3>
        
        <input type="text" class="modal-input" id="newItemName" placeholder="Garment Designation...">
        
        <select class="modal-input" id="newItemCat">
            <option value="head">HEADWEAR</option>
            <option value="torso">TORSO / SHIRT</option>
            <option value="legs">LEGS / PANTS</option>
            <option value="feet">FOOTWEAR</option>
            <option value="acc">ACCESSORY</option>
        </select>

        <label class="file-upload-btn">
            [ CAPTURE_IMAGE / UPLOAD ]
            <input type="file" accept="image/*" capture="environment" id="fileInput" onchange="handleImageUpload(event)">
        </label>

        <div class="preview-box">
            <span style="color: #555; font-size: 0.8rem;" id="previewText">AWAITING_IMAGE_DATA</span>
            <img id="uploadPreview">
        </div>

        <div class="modal-actions">
            <button class="modal-btn modal-cancel" onclick="closeAddModal()">ABORT</button>
            <button class="modal-btn modal-save" onclick="saveNewGarment()">STORE_DATA</button>
        </div>
    </div>
</div>

<script>
    // --- DATABASE ---
    let wardrobeDB = JSON.parse(localStorage.getItem('wos_wardrobe_items')) || [];
    let lookbookDB = JSON.parse(localStorage.getItem('wos_wardrobe_outfits')) || [];
    
    let currentFilter = 'all';
    let base64Temp = null; 

    // Current Mannequin State
    let mannequin = { head: null, torso: null, legs: null, feet: null, acc: null };

    // --- INITIALIZATION ---
    function initWardrobe() {
        renderInventory();
        renderLookbook();
    }

    // --- INVENTORY LOGIC ---
    function filterInv(cat, btnEl) {
        currentFilter = cat;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btnEl.classList.add('active');
        renderInventory();
    }

    function renderInventory() {
        const grid = document.getElementById('invGrid');
        grid.innerHTML = "";

        const filtered = currentFilter === 'all' ? wardrobeDB : wardrobeDB.filter(i => i.cat === currentFilter);

        if (filtered.length === 0) {
            grid.innerHTML = "<div style='color:#555; text-align:center; grid-column: 1/-1; padding-top:20px;'>DATABASE_EMPTY</div>";
            return;
        }

        filtered.forEach(item => {
            const el = document.createElement('div');
            el.className = 'inv-item';
            el.draggable = true;
            el.ondragstart = (e) => dragStart(e, item.id);
            el.onclick = () => equipItem(item); 
            
            el.innerHTML = `
                <img src="${item.img}" class="inv-img">
                <div class="inv-name">${item.name}</div>
            `;
            grid.appendChild(el);
        });
    }

    // --- MANNEQUIN LOGIC ---
    function dragStart(e, id) {
        e.dataTransfer.setData("text/plain", id);
    }

    function allowDrop(e) {
        e.preventDefault();
    }

    function drop(e) {
        e.preventDefault();
        const id = e.dataTransfer.getData("text/plain");
        const item = wardrobeDB.find(i => i.id == id);
        if (item) equipItem(item);
    }

    function equipItem(item) {
        mannequin[item.cat] = item;
        
        const slot = document.getElementById(`slot-${item.cat}`);
        const imgEl = document.getElementById(`img-${item.cat}`);
        
        imgEl.src = item.img;
        slot.classList.add('filled');
    }

    function clearSlot(cat) {
        mannequin[cat] = null;
        const slot = document.getElementById(`slot-${cat}`);
        const imgEl = document.getElementById(`img-${cat}`);
        
        imgEl.src = "";
        slot.classList.remove('filled');
    }

    function loadOutfitToMannequin(outfitId) {
        const outfit = lookbookDB.find(o => o.id === outfitId);
        if(!outfit) return;

        ['head', 'torso', 'legs', 'feet', 'acc'].forEach(cat => {
            if (outfit.items[cat]) {
                equipItem(outfit.items[cat]);
            } else {
                clearSlot(cat);
            }
        });
        document.getElementById('outfitNameInput').value = outfit.name;
    }

    // --- LOOKBOOK LOGIC ---
    function saveOutfit() {
        const name = document.getElementById('outfitNameInput').value.trim();
        if (!name) return alert("SYS_ERROR: OUTFIT_DESIGNATION_REQUIRED");

        const isEmpty = !Object.values(mannequin).some(val => val !== null);
        if (isEmpty) return alert("SYS_ERROR: MANNEQUIN_EMPTY");

        const outfit = {
            id: Date.now(),
            name: name,
            items: { ...mannequin }
        };

        lookbookDB.push(outfit);
        localStorage.setItem('wos_wardrobe_outfits', JSON.stringify(lookbookDB));
        
        document.getElementById('outfitNameInput').value = "";
        renderLookbook();
    }

    function renderLookbook() {
        const list = document.getElementById('lookbookList');
        list.innerHTML = "";

        if (lookbookDB.length === 0) {
            list.innerHTML = "<div style='color:#555; text-align:center; padding-top:20px;'>NO_ARCHIVES_FOUND</div>";
            return;
        }

        lookbookDB.forEach(outfit => {
            const card = document.createElement('div');
            card.className = 'outfit-card';
            
            let thumbsHtml = "";
            ['head', 'torso', 'legs', 'feet', 'acc'].forEach(cat => {
                if(outfit.items[cat]) {
                    thumbsHtml += `<img src="${outfit.items[cat].img}" class="outfit-thumb" title="${outfit.items[cat].name}">`;
                }
            });

            card.innerHTML = `
                <button class="btn-delete" onclick="deleteOutfit(${outfit.id})">X</button>
                <div class="outfit-card-title">${outfit.name}</div>
                <div class="outfit-preview">${thumbsHtml}</div>
                <button class="btn-equip" onclick="loadOutfitToMannequin(${outfit.id})">LOAD_TO_MANNEQUIN</button>
            `;
            list.appendChild(card);
        });
    }

    function deleteOutfit(id) {
        lookbookDB = lookbookDB.filter(o => o.id !== id);
        localStorage.setItem('wos_wardrobe_outfits', JSON.stringify(lookbookDB));
        renderLookbook();
    }

    // --- IMAGE PROCESSING & MODAL LOGIC ---
    function openAddModal() {
        document.getElementById('addModal').style.display = 'flex';
        document.getElementById('newItemName').value = '';
        document.getElementById('fileInput').value = '';
        document.getElementById('uploadPreview').style.display = 'none';
        document.getElementById('previewText').style.display = 'block';
        base64Temp = null;
    }

    function closeAddModal() {
        document.getElementById('addModal').style.display = 'none';
    }

    function handleImageUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX_SIZE = 300; 
                let w = img.width;
                let h = img.height;

                if (w > h) {
                    if (w > MAX_SIZE) { h *= MAX_SIZE / w; w = MAX_SIZE; }
                } else {
                    if (h > MAX_SIZE) { w *= MAX_SIZE / h; h = MAX_SIZE; }
                }

                canvas.width = w;
                canvas.height = h;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, w, h);

                base64Temp = canvas.toDataURL('image/jpeg', 0.8);

                const previewImg = document.getElementById('uploadPreview');
                previewImg.src = base64Temp;
                previewImg.style.display = 'block';
                document.getElementById('previewText').style.display = 'none';
            }
            img.src = e.target.result;
        }
        reader.readAsDataURL(file);
    }

    function saveNewGarment() {
        const name = document.getElementById('newItemName').value.trim();
        const cat = document.getElementById('newItemCat').value;

        if (!name) return alert("SYS_ERROR: DESIGNATION_REQUIRED");
        if (!base64Temp) return alert("SYS_ERROR: IMAGE_DATA_MISSING");

        const newItem = {
            id: Date.now(),
            name: name,
            cat: cat,
            img: base64Temp
        };

        wardrobeDB.push(newItem);
        
        try {
            localStorage.setItem('wos_wardrobe_items', JSON.stringify(wardrobeDB));
            closeAddModal();
            renderInventory();
        } catch (e) {
            alert("SYS_ERROR: STORAGE_QUOTA_EXCEEDED. Please delete old items.");
            wardrobeDB.pop(); 
        }
    }

    // --- BOOT ---
    initWardrobe();

</script>
</body>
</html>
