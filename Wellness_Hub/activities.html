<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W-OS // TACTICAL_NAV</title>
    <style>
        :root {
            --bg-dark: #050505;
            --neon-cyan: #00e5ff;
            --text-primary: #e0faff; 
            --text-dim: #94e2ed;
            --neon-dim: rgba(0, 229, 255, 0.2);
            --neon-warn: #ff2a2a;
            --font-main: 'Courier New', Courier, monospace;
        }

        body { 
            font-family: var(--font-main); background-color: var(--bg-dark); color: var(--text-primary); 
            margin: 0; padding: 20px;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
        }

        .container { 
            max-width: 1100px; margin: 0 auto; border: 1px solid var(--neon-cyan); 
            background: rgba(0, 10, 15, 0.95); padding: 20px;
            clip-path: polygon(25px 0, 100% 0, 100% calc(100% - 25px), calc(100% - 25px) 100%, 0 100%, 0 25px); 
        }

        header { border-bottom: 2px solid var(--neon-cyan); padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { margin: 0; font-size: 1.1rem; letter-spacing: 4px; color: var(--neon-cyan); }

        .btn-return { background: none; border: 1px solid var(--neon-cyan); color: var(--neon-cyan); padding: 5px 15px; cursor: pointer; font-family: inherit; font-size: 0.7rem; font-weight: bold; clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px); transition: 0.3s; }
        .btn-return:hover { background: var(--neon-cyan); color: black; box-shadow: 0 0 15px var(--neon-cyan); }

        /* Layout Grid */
        .dashboard { display: grid; grid-template-columns: 320px 1fr; gap: 20px; }
        .panel { background: rgba(0, 229, 255, 0.02); border: 1px solid var(--neon-dim); padding: 15px; }

        h2 { font-size: 0.8rem; text-transform: uppercase; border-left: 3px solid var(--neon-cyan); padding-left: 10px; margin: 0 0 15px 0; color: var(--neon-cyan); }
        label { display: block; font-size: 0.7rem; color: var(--text-dim); font-weight: bold; margin-top: 15px; margin-bottom: 5px; }
        
        input, select { background: #000; border: 1px solid var(--neon-dim); color: #fff; padding: 8px; font-family: inherit; outline: none; font-size: 0.8rem; width: 100%; box-sizing: border-box; }
        input:focus, select:focus { border-color: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-dim); }

        .cyber-check { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.7rem; color: var(--text-primary); margin-top: 5px; }
        .cyber-check input { width: auto; margin: 0; }

        .action-btn { width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid var(--neon-cyan); color: var(--neon-cyan); cursor: pointer; font-family: inherit; font-size: 0.8rem; font-weight: bold; margin-top: 20px; letter-spacing: 2px; transition: 0.3s; }
        .action-btn:hover { background: var(--neon-cyan); color: black; box-shadow: 0 0 15px var(--neon-cyan); }

        /* Scrollable Checkbox Box */
        .scroll-box { max-height: 100px; overflow-y: auto; background: #000; border: 1px solid var(--neon-dim); padding: 10px; margin-bottom: 10px;}
        .scroll-box label { margin-top: 0; margin-bottom: 8px; }

        /* RADAR MAP */
        .radar-container { position: relative; width: 100%; height: 320px; background: #020508; border: 1px solid var(--neon-dim); overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .radar-grid { position: absolute; width: 200%; height: 200%; background-image: radial-gradient(var(--neon-dim) 1px, transparent 1px); background-size: 30px 30px; }
        
        /* The New Seamless Radar Sweep */
        .radar-sweep { position: absolute; width: 200%; height: 200%; border-radius: 50%; background: conic-gradient(from 0deg, transparent 70%, rgba(0, 229, 255, 0.4) 100%); animation: sweep 4s linear infinite; pointer-events: none; z-index: 1; }
        @keyframes sweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .home-base { position: absolute; width: 12px; height: 12px; background: var(--neon-cyan); border-radius: 50%; box-shadow: 0 0 15px var(--neon-cyan); z-index: 10; cursor: help; }
        .home-base::after { content: attr(data-loc); position: absolute; top: -15px; left: 15px; font-size: 0.5rem; color: var(--neon-cyan); white-space: nowrap; pointer-events: none; }
        
        .blip { position: absolute; width: 8px; height: 8px; background: #2ecc71; border-radius: 50%; cursor: pointer; transform: translate(-50%, -50%); transition: 0.2s; box-shadow: 0 0 8px #2ecc71; z-index: 5; }
        .blip:hover { transform: translate(-50%, -50%) scale(2); background: #fff; box-shadow: 0 0 15px #fff; z-index: 15; }

        /* ROUTE OVERLAY (The Topographical View) */
        .route-overlay { position: absolute; top: 100%; left: 0; width: 100%; height: 100%; background: rgba(0, 10, 15, 0.95); border-top: 2px solid var(--neon-cyan); z-index: 20; transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; flex-direction: column; }
        .route-overlay.active { top: 0; }
        
        .route-header { padding: 10px 15px; background: #000; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--neon-dim); }
        .route-header span { font-weight: bold; color: var(--neon-cyan); letter-spacing: 2px; font-size: 0.8rem;}
        .close-route { background: none; border: none; color: var(--neon-warn); cursor: pointer; font-weight: bold; font-family: inherit; }
        
        .route-map-area { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background-image: linear-gradient(var(--neon-dim) 1px, transparent 1px), linear-gradient(90deg, var(--neon-dim) 1px, transparent 1px); background-size: 20px 20px; }
        
        /* The SVG Path Drawing Animation */
        .trail-path { fill: none; stroke: #2ecc71; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; filter: drop-shadow(0 0 5px #2ecc71); stroke-dasharray: 1000; stroke-dashoffset: 1000; }
        .route-overlay.active .trail-path { animation: draw-trail 2s ease-out forwards; }
        @keyframes draw-trail { to { stroke-dashoffset: 0; } }
        
        .route-stats { padding: 15px; background: rgba(0,0,0,0.8); border-top: 1px solid var(--neon-dim); font-size: 0.7rem; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-box { border-left: 2px solid var(--neon-cyan); padding-left: 8px; }
        .stat-val { color: var(--neon-cyan); font-weight: bold; font-size: 0.9rem; }

        /* RESULTS & SAVED LIST */
        .tabs { display: flex; margin-top: 20px; border-bottom: 1px solid var(--neon-dim); }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; font-size: 0.7rem; font-weight: bold; color: var(--text-dim); }
        .tab.active { color: var(--neon-cyan); border-bottom: 2px solid var(--neon-cyan); background: rgba(0, 229, 255, 0.05); }

        .list-container { max-height: 200px; overflow-y: auto; padding-top: 10px; }
        .activity-card { border-left: 2px solid var(--neon-dim); padding: 10px; margin-bottom: 10px; background: rgba(0,0,0,0.4); display: flex; justify-content: space-between; align-items: center; }
        .activity-card:hover { border-color: var(--neon-cyan); background: rgba(0, 229, 255, 0.05); }
        .act-title { font-size: 0.8rem; font-weight: bold; color: var(--neon-cyan); }
        .act-meta { font-size: 0.6rem; color: var(--text-dim); margin-top: 3px; }
        
        .btn-small { background: none; border: 1px solid var(--neon-cyan); color: var(--neon-cyan); padding: 4px 8px; font-size: 0.6rem; cursor: pointer; }
        .btn-small:hover { background: var(--neon-cyan); color: black; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-dim); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>SYS_NAV // TACTICAL_ACTIVITIES</h1>
        <button class="btn-return" onclick="window.parent.closeApp()">◄ TERMINATE_LINK</button>
    </header>

    <div class="dashboard">
        <div class="panel" style="overflow-y: auto; max-height: 600px;">
            
            <h2>01_OPERATIONAL_BASE</h2>
            <select id="fltLocation" onchange="updateBaseLocation()">
                <option value="LARAMIE, WY">LARAMIE, WY (HOME)</option>
                <option value="CHEYENNE, WY">CHEYENNE, WY</option>
                <option value="FORT COLLINS, CO">FORT COLLINS, CO</option>
            </select>

            <h2>02_CLASSIFICATION</h2>
            <div class="scroll-box" id="typeFilters">
                <label class="cyber-check"><input type="checkbox" value="HIKING" checked> HIKING</label>
                <label class="cyber-check"><input type="checkbox" value="RUNNING" checked> RUNNING</label>
                <label class="cyber-check"><input type="checkbox" value="BIKING" checked> BIKING</label>
                <label class="cyber-check"><input type="checkbox" value="WALKING" checked> WALKING</label>
                <label class="cyber-check"><input type="checkbox" value="CLIMBING" checked> CLIMBING</label>
                <label class="cyber-check"><input type="checkbox" value="CAMPING" checked> CAMPING</label>
                <label class="cyber-check"><input type="checkbox" value="AQUATICS" checked> AQUATICS</label>
                <label class="cyber-check"><input type="checkbox" value="FISHING" checked> FISHING</label>
                <label class="cyber-check"><input type="checkbox" value="HUNTING" checked> HUNTING</label>
                <label class="cyber-check"><input type="checkbox" value="SIGHTSEEING" checked> SIGHTSEEING</label>
                <label class="cyber-check"><input type="checkbox" value="DRIVING" checked> DRIVING</label>
            </div>

            <h2>03_SPATIAL_PARAMETERS</h2>
            <label style="margin-top:0;">SEARCH_RADIUS:</label>
            <select id="fltRadius">
                <option value="999">NO LIMIT</option>
                <option value="5">WITHIN 5 MILES</option>
                <option value="15">WITHIN 15 MILES</option>
                <option value="30">WITHIN 30 MILES</option>
                <option value="50">WITHIN 50 MILES</option>
            </select>

            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <div style="flex: 1;">
                    <label style="margin-top:0;">MIN_DIST (MI):</label>
                    <input type="number" id="fltMinDist" value="0" min="0" step="0.5">
                </div>
                <div style="flex: 1;">
                    <label style="margin-top:0;">MAX_DIST (MI):</label>
                    <input type="number" id="fltMaxDist" value="50" min="0" step="0.5">
                </div>
            </div>

            <label class="cyber-check" style="margin-top: 10px;">
                <input type="checkbox" id="chkRoundTrip" checked> ENFORCE ROUND-TRIP MATH
            </label>

            <h2>04_LOGISTICS_BUDGET</h2>
            <label class="cyber-check" style="margin-top:0;">
                <input type="checkbox" id="chkFreeOnly" onchange="toggleBudget()"> REQUIRE_FREE_ACCESS
            </label>
            <div id="budgetInputs" style="display: flex; gap: 10px; margin-top: 10px;">
                <div style="flex: 1;">
                    <label style="margin-top:0;">MAX_BUDGET ($):</label>
                    <input type="number" id="fltMaxCost" value="50" min="0" step="1">
                </div>
                <div style="flex: 1;">
                    <label style="margin-top:0;">PARTY_SIZE:</label>
                    <input type="number" id="fltPartySize" value="1" min="1">
                </div>
            </div>

            <button class="action-btn" onclick="executeScan()">EXECUTE_SCAN</button>
        </div>

        <div class="panel" style="padding: 0; border: none; background: transparent;">
            
            <div class="radar-container" id="radar">
                <div class="radar-grid"></div>
                <div class="radar-sweep"></div>
                <div class="home-base" id="homeBaseNode" data-loc="LARAMIE, WY"></div>
                
                <div class="route-overlay" id="routeOverlay">
                    <div class="route-header">
                        <span id="ro-title">TOPOGRAPHICAL_UPLINK</span>
                        <button class="close-route" onclick="closeRoute()">[ X ]</button>
                    </div>
                    <div class="route-map-area">
                        <svg width="200" height="150" viewBox="0 0 200 150" id="ro-svg">
                            </svg>
                    </div>
                    <div class="route-stats">
                        <div class="stat-box">ELEVATION_GAIN<br><span class="stat-val" id="ro-elev">0 FT</span></div>
                        <div class="stat-box">LOGISTICS_REQ<br><span class="stat-val" id="ro-cost">$0.00</span></div>
                        <div class="stat-box">CLASSIFICATION<br><span class="stat-val" id="ro-type">N/A</span></div>
                        <div class="stat-box">TOTAL_DISTANCE<br><span class="stat-val" id="ro-dist">0 MI</span></div>
                    </div>
                    <button class="action-btn" id="ro-save-btn" style="margin: 0; border-top: 1px solid var(--neon-cyan); border-left: none; border-right: none; border-bottom: none;">SAVE_TO_ARCHIVE</button>
                </div>
            </div>

            <div class="tabs">
                <div class="tab active" id="tab-scan" onclick="switchTab('scan')">SCAN_RESULTS (<span id="resCount">0</span>)</div>
                <div class="tab" id="tab-saved" onclick="switchTab('saved')">SAVED_ARCHIVE</div>
            </div>

            <div class="list-container" id="resultsList">
                <p style="font-size:0.7rem; color:var(--text-dim); text-align:center;">[ AWAITING_SCAN_COMMAND ]</p>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleBudget() {
        const isFreeOnly = document.getElementById('chkFreeOnly').checked;
        const inputs = document.getElementById('budgetInputs');
        inputs.style.opacity = isFreeOnly ? '0.3' : '1';
        inputs.style.pointerEvents = isFreeOnly ? 'none' : 'auto';
    }

    function updateBaseLocation() {
        const loc = document.getElementById('fltLocation').value;
        document.getElementById('homeBaseNode').setAttribute('data-loc', loc);
        // Clear radar until scan is run
        document.querySelectorAll('.blip').forEach(b => b.remove());
        document.getElementById('resultsList').innerHTML = `<p style="font-size:0.7rem; color:var(--text-dim); text-align:center;">[ BASE RE-ALIGNED. AWAITING SCAN. ]</p>`;
        document.getElementById('resCount').innerText = 0;
    }

    // --- ENHANCED GEO-DATABASE W/ LOCATIONS ---
    const geoDatabase = [
        // LARAMIE
        { id: 1, base: "LARAMIE, WY", name: "VEDAUWOO GLEN", type: "CLIMBING", dist: 1.2, isLoop: true, radius: 18, x: 70, y: 30, cost: 5, perPerson: false },
        { id: 2, base: "LARAMIE, WY", name: "TURTLE ROCK TRAIL", type: "HIKING", dist: 2.8, isLoop: true, radius: 18, x: 72, y: 32, cost: 5, perPerson: false },
        { id: 3, base: "LARAMIE, WY", name: "LARAMIE RIVER GREENBELT", type: "WALKING", dist: 5.8, isLoop: false, radius: 1, x: 48, y: 52, cost: 0, perPerson: false },
        { id: 6, base: "LARAMIE, WY", name: "LAKE HATTIE RESERVOIR", type: "FISHING", dist: 0, isLoop: true, radius: 15, x: 20, y: 40, cost: 0, perPerson: false },
        { id: 7, base: "LARAMIE, WY", name: "HAPPY JACK REC AREA", type: "CAMPING", dist: 0, isLoop: true, radius: 12, x: 65, y: 45, cost: 10, perPerson: false },
        { id: 10, base: "LARAMIE, WY", name: "PUBLIC LANDS UNIT 38", type: "HUNTING", dist: 0, isLoop: true, radius: 25, x: 20, y: 15, cost: 17, perPerson: true },
        
        // CHEYENNE
        { id: 11, base: "CHEYENNE, WY", name: "CURT GOWDY STATE PARK", type: "BIKING", dist: 15.0, isLoop: true, radius: 24, x: 20, y: 50, cost: 7, perPerson: false },
        { id: 12, base: "CHEYENNE, WY", name: "CHEYENNE GREENWAY", type: "RUNNING", dist: 39.0, isLoop: true, radius: 2, x: 50, y: 45, cost: 0, perPerson: false },
        { id: 13, base: "CHEYENNE, WY", name: "LIONS PARK LAKE", type: "AQUATICS", dist: 0, isLoop: true, radius: 3, x: 45, y: 40, cost: 0, perPerson: false },
        
        // FORT COLLINS
        { id: 14, base: "FORT COLLINS, CO", name: "HORSETOOTH MOUNTAIN", type: "HIKING", dist: 5.2, isLoop: false, radius: 8, x: 25, y: 65, cost: 10, perPerson: false },
        { id: 15, base: "FORT COLLINS, CO", name: "CACHE LA POUDRE RIVER", type: "AQUATICS", dist: 0, isLoop: false, radius: 15, x: 30, y: 25, cost: 0, perPerson: false },
        { id: 16, base: "FORT COLLINS, CO", name: "PAWNEE BUTTES", type: "SIGHTSEEING", dist: 1.5, isLoop: false, radius: 45, x: 85, y: 15, cost: 0, perPerson: false }
    ];

    let currentScanResults = [];

    // --- LOGIC ENGINE ---
    function executeScan() {
        const activeBase = document.getElementById('fltLocation').value;
        const typeCheckboxes = document.querySelectorAll('#typeFilters input:checked');
        const selectedTypes = Array.from(typeCheckboxes).map(cb => cb.value);

        const maxRadius = parseFloat(document.getElementById('fltRadius').value);
        const minDist = parseFloat(document.getElementById('fltMinDist').value) || 0;
        const maxDist = parseFloat(document.getElementById('fltMaxDist').value) || 999;
        const enforceRT = document.getElementById('chkRoundTrip').checked;
        
        const freeOnly = document.getElementById('chkFreeOnly').checked;
        const maxBudget = parseFloat(document.getElementById('fltMaxCost').value) || 9999;
        const partySize = parseInt(document.getElementById('fltPartySize').value) || 1;

        currentScanResults = geoDatabase.filter(activity => {
            if (activity.base !== activeBase) return false;
            if (selectedTypes.length > 0 && !selectedTypes.includes(activity.type)) return false;
            if (activity.radius > maxRadius) return false;

            let actualDist = activity.isLoop ? activity.dist : (enforceRT ? activity.dist * 2 : activity.dist);
            if ((activity.dist > 0) && (actualDist < minDist || actualDist > maxDist)) return false;

            let totalCost = activity.perPerson ? (activity.cost * partySize) : activity.cost;
            if (freeOnly && totalCost > 0) return false;
            if (totalCost > maxBudget) return false;

            activity._calculatedDist = actualDist;
            activity._totalCost = totalCost;
            return true;
        });

        document.getElementById('resCount').innerText = currentScanResults.length;
        plotRadar(currentScanResults);
        renderList(currentScanResults, 'scan');
        switchTab('scan');
    }

    // --- RADAR & ROUTE OVERLAY LOGIC ---
    function plotRadar(data) {
        const radar = document.getElementById('radar');
        document.querySelectorAll('.blip').forEach(b => b.remove());

        data.forEach(item => {
            const blip = document.createElement('div');
            blip.className = 'blip';
            blip.style.left = `${item.x}%`;
            blip.style.top = `${item.y}%`;
            blip.title = `${item.name} (${item.radius}mi away)`;
            
            blip.onclick = () => openRoute(item);
            radar.appendChild(blip);
        });
    }

    function openRoute(item) {
        document.getElementById('ro-title').innerText = `DATA // ${item.name}`;
        
        let distStr = item._calculatedDist > 0 ? `${item._calculatedDist} MI` : "N/A";
        let loopStr = item.dist === 0 ? "" : (item.isLoop ? "(LOOP)" : (document.getElementById('chkRoundTrip').checked ? "(ROUND-TRIP)" : "(OUT/BACK)"));
        
        document.getElementById('ro-dist').innerText = `${distStr} ${loopStr}`;
        document.getElementById('ro-type').innerText = item.type;
        document.getElementById('ro-cost').innerText = item._totalCost === 0 ? "FREE" : `$${item._totalCost.toFixed(2)}`;
        
        // Mock Elevation Math
        let elev = item.dist > 0 ? Math.floor(item._calculatedDist * (Math.random() * 150 + 50)) : 0;
        document.getElementById('ro-elev').innerText = `${elev} FT`;

        // Draw Mock SVG Line
        const svg = document.getElementById('ro-svg');
        // Generate random jagged path
        let points = "10,140 ";
        let currX = 10;
        let currY = 140;
        for(let i=0; i<6; i++) {
            currX += Math.floor(Math.random() * 30 + 10);
            currY -= Math.floor(Math.random() * 20 + 5);
            points += `${currX},${currY} `;
        }
        svg.innerHTML = `<polyline class="trail-path" points="${points}" />`;

        // Update Save Button
        const saveBtn = document.getElementById('ro-save-btn');
        saveBtn.onclick = () => { saveActivity(item.id); closeRoute(); };

        document.getElementById('routeOverlay').classList.add('active');
    }

    function closeRoute() {
        document.getElementById('routeOverlay').classList.remove('active');
    }

    // --- UI RENDERERS ---
    function renderList(data, mode) {
        const container = document.getElementById('resultsList');
        container.innerHTML = "";

        if (data.length === 0) {
            container.innerHTML = `<p style="font-size:0.7rem; color:var(--text-dim); text-align:center;">[ NO TARGETS MATCH PARAMETERS ]</p>`;
            return;
        }

        data.forEach(item => {
            let distStr = item._calculatedDist > 0 ? `${item._calculatedDist}mi` : "N/A";
            let costBadge = item._totalCost === 0 ? `<span style="color:#2ecc71;">[ FREE ]</span>` : `<span style="color:var(--neon-warn);">[ $${item._totalCost.toFixed(2)} ]</span>`;

            const actionBtn = mode === 'scan' 
                ? `<button class="btn-small" onclick='openRoute(${JSON.stringify(item).replace(/'/g, "\\'")})'>VIEW</button>` 
                : `<button class="btn-small" style="color:#ff2a2a; border-color:#ff2a2a;" onclick="removeActivity(${item.id})">DEL</button>`;

            container.innerHTML += `
                <div class="activity-card">
                    <div>
                        <div class="act-title">${item.name} ${costBadge}</div>
                        <div class="act-meta">TYPE: ${item.type} // DIST: ${distStr}</div>
                    </div>
                    ${actionBtn}
                </div>
            `;
        });
    }

    function saveActivity(id) {
        const item = geoDatabase.find(i => i.id === id);
        let archive = JSON.parse(localStorage.getItem('wos_activities')) || [];
        if (!archive.some(i => i.id === id)) {
            archive.push(item);
            localStorage.setItem('wos_activities', JSON.stringify(archive));
            alert(`[ SAVED ]\n${item.name} added to archive.`);
        } else {
            alert("SYS_MSG: Target already in archive.");
        }
    }

    function removeActivity(id) {
        let archive = JSON.parse(localStorage.getItem('wos_activities')) || [];
        archive = archive.filter(i => i.id !== id);
        localStorage.setItem('wos_activities', JSON.stringify(archive));
        loadSaved();
    }

    function loadSaved() {
        let archive = JSON.parse(localStorage.getItem('wos_activities')) || [];
        archive.forEach(a => { if(!a._totalCost) a._totalCost = a.cost; }); 
        renderList(archive, 'saved');
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(`tab-${tabId}`).classList.add('active');
        if (tabId === 'saved') loadSaved();
        else renderList(currentScanResults, 'scan');
    }
</script>
</body>
</html>
