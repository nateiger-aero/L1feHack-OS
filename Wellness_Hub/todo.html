<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W-OS // TASK_DIRECTIVES</title>
    <style>
        :root {
            --bg-dark: #050505;
            --neon-cyan: #00e5ff;
            --text-primary: #e0faff; 
            --text-dim: #94e2ed;
            --neon-dim: rgba(0, 229, 255, 0.2);
            --imp-critical: #ff2a2a;
            --imp-high: #f39c12;
            --imp-normal: #00e5ff;
            --imp-low: #2ecc71;
            --imp-optional: #7f8c8d;
            --font-main: 'Courier New', Courier, monospace;
        }

        body { 
            font-family: var(--font-main); background-color: var(--bg-dark); color: var(--text-primary); 
            margin: 0; padding: 20px;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
        }

        .container { 
            max-width: 1200px; margin: 0 auto; border: 1px solid var(--neon-cyan); 
            background: rgba(0, 10, 15, 0.95); padding: 25px;
            clip-path: polygon(25px 0, 100% 0, 100% calc(100% - 25px), calc(100% - 25px) 100%, 0 100%, 0 25px); 
        }

        header { border-bottom: 2px solid var(--neon-cyan); padding-bottom: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { margin: 0; font-size: 1.2rem; letter-spacing: 4px; color: var(--neon-cyan); }

        .btn-return { background: none; border: 1px solid var(--neon-cyan); color: var(--neon-cyan); padding: 8px 18px; cursor: pointer; font-family: inherit; font-size: 0.7rem; font-weight: bold; clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px); transition: 0.3s; }
        .btn-return:hover { background: var(--neon-cyan); color: black; box-shadow: 0 0 15px var(--neon-cyan); }

        /* Grid Layout */
        .dashboard { display: grid; grid-template-columns: 350px 1fr; gap: 20px; align-items: start; }
        .panel { background: rgba(0, 229, 255, 0.02); border: 1px solid var(--neon-dim); padding: 20px; }
        
        h2 { font-size: 0.85rem; text-transform: uppercase; border-left: 4px solid var(--neon-cyan); padding-left: 10px; margin: 0 0 15px 0; color: var(--neon-cyan); letter-spacing: 1px; }
        h3 { font-size: 0.75rem; color: var(--text-dim); margin: 0 0 10px 0; letter-spacing: 2px; }
        
        /* Form Elements */
        label { display: block; font-size: 0.7rem; color: var(--text-dim); font-weight: bold; margin-bottom: 5px; margin-top: 15px; }
        input, select { background: #000; border: 1px solid var(--neon-dim); color: #fff; padding: 10px; font-family: inherit; outline: none; font-size: 0.8rem; width: 100%; box-sizing: border-box; }
        input:focus, select:focus { border-color: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-dim); }

        .flex-row { display: flex; gap: 10px; align-items: flex-end; }
        .cyber-check { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.7rem; color: var(--text-primary); margin-top: 5px; }
        .cyber-check input { width: auto; margin: 0; }

        .btn-commit { width: 100%; padding: 15px; background: none; border: 2px solid var(--neon-cyan); color: var(--neon-cyan); cursor: pointer; font-weight: bold; letter-spacing: 4px; margin-top: 25px; font-family: inherit; font-size: 0.9rem; clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px); transition: 0.3s; }
        .btn-commit:hover { background: var(--neon-cyan); color: black; box-shadow: 0 0 20px var(--neon-cyan); }

        /* Task Items */
        .task-card { background: rgba(0,0,0,0.6); border-left: 3px solid var(--neon-cyan); padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-start; transition: 0.3s; }
        .task-card:hover { background: rgba(0,229,255,0.05); }
        .task-info { flex: 1; }
        .task-title { font-weight: bold; font-size: 0.85rem; color: #fff; margin-bottom: 4px; }
        .task-meta { font-size: 0.6rem; color: var(--text-dim); display: flex; gap: 10px; flex-wrap: wrap; }
        
        .badge { padding: 2px 6px; border: 1px solid currentColor; font-weight: bold; font-size: 0.55rem; letter-spacing: 1px; }
        .badge-deadline { color: var(--imp-critical); background: rgba(255,42,42,0.1); }
        .badge-recurring { color: var(--neon-purple); border-color: var(--neon-purple); background: rgba(155,89,182,0.1); }
        
        .btn-complete { background: none; border: 1px dashed var(--neon-success); color: var(--neon-success); padding: 5px 10px; cursor: pointer; font-size: 0.6rem; font-weight: bold; margin-left: 10px; transition: 0.3s; }
        .btn-complete:hover { background: var(--neon-success); color: black; box-shadow: 0 0 10px var(--neon-success); }

        /* Weekly Grid */
        .week-header { font-size: 1rem; color: #fff; text-align: center; border-bottom: 1px solid var(--neon-dim); padding-bottom: 10px; margin-bottom: 15px; letter-spacing: 2px; }
        .week-grid { display: grid; grid-template-columns: 1fr; gap: 15px; max-height: 600px; overflow-y: auto; padding-right: 10px; }
        .day-block { border: 1px solid var(--neon-dim); background: rgba(0,0,0,0.4); padding: 15px; }
        .day-header { font-weight: bold; color: var(--neon-cyan); border-bottom: 1px dashed var(--neon-dim); padding-bottom: 5px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        
        /* Today Sidebar */
        .today-panel { border-color: var(--neon-cyan); box-shadow: inset 0 0 20px rgba(0,229,255,0.05); }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-dim); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>SYS_MIND // TASK_DIRECTIVES</h1>
        <button class="btn-return" onclick="window.parent.closeApp()">◄ TERMINATE_LINK</button>
    </header>

    <div class="dashboard">
        
        <div class="column-left">
            <div class="panel">
                <h2>01_NEW_DIRECTIVE</h2>
                
                <label>TASK_DESIGNATION:</label>
                <input type="text" id="tName" placeholder="e.g. Complete Capstone Research">

                <div class="flex-row">
                    <div style="flex: 2;">
                        <label>TARGET_DATE:</label>
                        <input type="date" id="tDate">
                    </div>
                    <div style="flex: 1;">
                        <label>TIME:</label>
                        <input type="time" id="tTime">
                    </div>
                </div>

                <div class="flex-row" style="margin-top: 15px; background: #000; padding: 10px; border: 1px solid var(--neon-dim);">
                    <div style="flex: 1;">
                        <label class="cyber-check" style="margin: 0;"><input type="checkbox" id="tDeadline"> HARD_DEADLINE</label>
                    </div>
                    <div style="flex: 1;">
                        <label class="cyber-check" style="margin: 0;"><input type="checkbox" id="tRecurring" onchange="toggleRecurring()"> RECURRING</label>
                    </div>
                </div>

                <div id="recurringOptions" style="display: none; margin-top: 10px;">
                    <label>FREQUENCY:</label>
                    <select id="tFrequency">
                        <option value="DAILY">DAILY</option>
                        <option value="WEEKLY">WEEKLY</option>
                        <option value="BI-WEEKLY">EVERY OTHER WEEK</option>
                        <option value="MONTHLY">MONTHLY</option>
                    </select>
                </div>

                <label>PRIORITY_LEVEL:</label>
                <select id="tImportance">
                    <option value="CRITICAL">CRITICAL / MANDATORY</option>
                    <option value="HIGH">MORE IMPORTANT</option>
                    <option value="NORMAL" selected>IMPORTANT</option>
                    <option value="LOW">LESS IMPORTANT</option>
                    <option value="OPTIONAL">OPTIONAL</option>
                </select>

                <button class="btn-commit" onclick="addTask()">ADD_TO_QUEUE</button>
            </div>

            <div class="panel today-panel" style="margin-top: 20px;">
                <h2>02_IMMEDIATE_ACTION</h2>
                <h3 id="todayHeader">TODAY // AWAITING SYNC</h3>
                <div id="todayList">
                    </div>
            </div>
        </div>

        <div class="panel">
            <h2>03_WEEKLY_TRAJECTORY</h2>
            <div class="week-header" id="weekHeader">AWAITING TEMPORAL SYNC...</div>
            
            <div class="week-grid" id="weekGrid">
                </div>
        </div>

    </div>
</div>

<script>
    // Priority Colors mapping
    const priorityColors = {
        "CRITICAL": "var(--imp-critical)",
        "HIGH": "var(--imp-high)",
        "NORMAL": "var(--imp-normal)",
        "LOW": "var(--imp-low)",
        "OPTIONAL": "var(--imp-optional)"
    };

    function toggleRecurring() {
        const isRec = document.getElementById('tRecurring').checked;
        document.getElementById('recurringOptions').style.display = isRec ? 'block' : 'none';
    }

    // --- DATE ENGINE ---
    // Get the Monday of the current week based on a given date
    function getMonday(d) {
        d = new Date(d);
        var day = d.getDay(),
            diff = d.getDate() - day + (day == 0 ? -6: 1); // adjust when day is sunday
        return new Date(d.setDate(diff));
    }

    function formatDateForDisplay(dateObj) {
        return dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function formatISODate(dateObj) {
        return dateObj.toISOString().split('T')[0];
    }

    // --- RENDER ENGINE ---
    function renderDashboard() {
        const tasks = JSON.parse(localStorage.getItem('wos_tasks')) || [];
        const activeTasks = tasks.filter(t => !t.completed); // Only show uncompleted

        // Set up the temporal frame (Current Week)
        const todayObj = new Date();
        const mondayObj = getMonday(todayObj);
        const sundayObj = new Date(mondayObj);
        sundayObj.setDate(mondayObj.getDate() + 6);

        // Update Headers
        document.getElementById('weekHeader').innerText = `[ ${formatDateForDisplay(mondayObj)} - ${formatDateForDisplay(sundayObj)} ]`;
        document.getElementById('todayHeader').innerText = `TODAY // ${formatDateForDisplay(todayObj).toUpperCase()}`;

        const weekGrid = document.getElementById('weekGrid');
        const todayList = document.getElementById('todayList');
        weekGrid.innerHTML = "";
        todayList.innerHTML = "";

        let todayCount = 0;

        // Loop through the 7 days of the week
        for (let i = 0; i < 7; i++) {
            let currentDayObj = new Date(mondayObj);
            currentDayObj.setDate(mondayObj.getDate() + i);
            let currentIso = formatISODate(currentDayObj);
            let dayName = currentDayObj.toLocaleDateString('en-US', { weekday: 'long' });

            // Filter tasks that fall on this day
            let daysTasks = activeTasks.filter(t => t.date === currentIso);
            
            // Build the Day Block HTML
            let dayHtml = `
                <div class="day-block">
                    <div class="day-header">
                        <span>${dayName.toUpperCase()}</span>
                        <span style="color:var(--text-dim); font-weight:normal;">${formatDateForDisplay(currentDayObj)}</span>
                    </div>
            `;

            if (daysTasks.length === 0) {
                dayHtml += `<div style="font-size:0.6rem; color:#555; text-align:center;">[ NO DIRECTIVES SCHEDULED ]</div>`;
            } else {
                // Sort by priority (Critical first)
                const prioValues = {"CRITICAL":5, "HIGH":4, "NORMAL":3, "LOW":2, "OPTIONAL":1};
                daysTasks.sort((a,b) => prioValues[b.importance] - prioValues[a.importance]);

                daysTasks.forEach(t => {
                    let taskHtml = buildTaskHtml(t);
                    dayHtml += taskHtml;
                    
                    // If this day is actually "Today", also copy to the Sidebar
                    if (currentIso === formatISODate(todayObj)) {
                        todayList.innerHTML += taskHtml;
                        todayCount++;
                    }
                });
            }
            dayHtml += `</div>`;
            weekGrid.innerHTML += dayHtml;
        }

        // Handle empty today
        if (todayCount === 0) {
            todayList.innerHTML = `<div style="font-size:0.6rem; color:var(--text-dim); text-align:center; padding: 20px 0;">[ ALL IMMEDIATE TASKS CLEARED ]</div>`;
        }
    }

    function buildTaskHtml(t) {
        const color = priorityColors[t.importance];
        let badges = `<span style="color:${color}; font-weight:bold;">[ ${t.importance} ]</span>`;
        
        if (t.deadline) badges += ` <span class="badge badge-deadline">DEADLINE</span>`;
        if (t.recurring) badges += ` <span class="badge badge-recurring" style="color:#9b59b6; border-color:#9b59b6;">🔁 ${t.frequency}</span>`;
        if (t.time) badges += ` <span>@ ${t.time}</span>`;

        return `
            <div class="task-card" style="border-color: ${color};">
                <div class="task-info">
                    <div class="task-title">${t.name}</div>
                    <div class="task-meta">${badges}</div>
                </div>
                <button class="btn-complete" onclick="completeTask(${t.id})">VERIFY</button>
            </div>
        `;
    }

    // --- TASK MANAGEMENT ---
    function addTask() {
        const name = document.getElementById('tName').value.trim();
        const date = document.getElementById('tDate').value;
        
        if (!name || !date) return alert("SYS_ERROR: DESIGNATION AND DATE REQUIRED.");

        const task = {
            id: Date.now(),
            name: name,
            date: date,
            time: document.getElementById('tTime').value,
            deadline: document.getElementById('tDeadline').checked,
            recurring: document.getElementById('tRecurring').checked,
            frequency: document.getElementById('tFrequency').value,
            importance: document.getElementById('tImportance').value,
            completed: false
        };

        let tasks = JSON.parse(localStorage.getItem('wos_tasks')) || [];
        tasks.push(task);
        localStorage.setItem('wos_tasks', JSON.stringify(tasks));

        // Clear Form
        document.getElementById('tName').value = "";
        document.getElementById('tTime').value = "";
        document.getElementById('tDeadline').checked = false;
        document.getElementById('tRecurring').checked = false;
        toggleRecurring();
        
        renderDashboard();
    }

    function completeTask(id) {
        let tasks = JSON.parse(localStorage.getItem('wos_tasks')) || [];
        const taskIndex = tasks.findIndex(t => t.id === id);
        
        if (taskIndex > -1) {
            tasks[taskIndex].completed = true;
            // Record completion timestamp for the Records/Achievements engine
            tasks[taskIndex].completedDate = new Date().toISOString().split('T')[0]; 
            localStorage.setItem('wos_tasks', JSON.stringify(tasks));
            renderDashboard();
        }
    }

    // Set default date to today
    document.getElementById('tDate').valueAsDate = new Date();
    renderDashboard();
</script>
</body>
</html>
