<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W-OS // HYGIENE_PROTOCOLS</title>
    <style>
        :root {
            --bg-dark: #050505;
            --neon-cyan: #00e5ff;
            --text-primary: #e0faff; 
            --text-dim: #94e2ed;
            --neon-dim: rgba(0, 229, 255, 0.2);
            --neon-warn: #f39c12;
            --font-main: 'Courier New', Courier, monospace;
        }

        body { 
            font-family: var(--font-main); background-color: var(--bg-dark); color: var(--text-primary); 
            margin: 0; padding: 20px;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
        }

        .container { 
            max-width: 1000px; margin: 0 auto; border: 1px solid var(--neon-cyan); 
            background: rgba(0, 10, 15, 0.95); padding: 25px;
            clip-path: polygon(25px 0, 100% 0, 100% calc(100% - 25px), calc(100% - 25px) 100%, 0 100%, 0 25px); 
        }

        header { border-bottom: 2px solid var(--neon-cyan); padding-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { margin: 0; font-size: 1.2rem; letter-spacing: 4px; color: var(--neon-cyan); }

        .btn-return { background: none; border: 1px solid var(--neon-cyan); color: var(--neon-cyan); padding: 8px 18px; cursor: pointer; font-family: inherit; font-size: 0.7rem; font-weight: bold; clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px); transition: 0.3s; }
        .btn-return:hover { background: var(--neon-cyan); color: black; box-shadow: 0 0 15px var(--neon-cyan); }

        /* Navigation Tabs */
        .tab-nav { display: flex; background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--neon-dim); margin-top: 15px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; color: var(--text-dim); cursor: pointer; font-family: inherit; font-size: 0.8rem; font-weight: bold; letter-spacing: 2px; transition: 0.3s; }
        .tab-btn.active { color: var(--neon-cyan); border-bottom: 3px solid var(--neon-cyan); background: rgba(0, 229, 255, 0.1); }
        .tab-content { display: none; padding: 20px 0; animation: slide-in 0.3s ease-out; }
        .tab-content.active { display: block; }
        @keyframes slide-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h2 { font-size: 0.9rem; text-transform: uppercase; border-left: 4px solid var(--neon-cyan); padding-left: 10px; margin: 0 0 15px 0; color: var(--neon-cyan); letter-spacing: 1px; }
        label { display: block; font-size: 0.7rem; color: var(--text-dim); font-weight: bold; margin-bottom: 5px; margin-top: 15px; }
        
        input, select { background: #000; border: 1px solid var(--neon-dim); color: #fff; padding: 10px; font-family: inherit; outline: none; font-size: 0.8rem; width: 100%; box-sizing: border-box; }
        input:focus, select:focus { border-color: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-dim); }

        .panel { background: rgba(0, 229, 255, 0.02); border: 1px solid var(--neon-dim); padding: 20px; position: relative; margin-bottom: 20px; }
        .flex-row { display: flex; gap: 10px; align-items: flex-end; }
        
        .action-btn { background: rgba(0,0,0,0.5); border: 1px solid var(--neon-cyan); color: var(--neon-cyan); padding: 10px 15px; cursor: pointer; font-family: inherit; font-size: 0.7rem; font-weight: bold; transition: 0.3s; text-transform: uppercase; margin-top: 10px; width: 100%; }
        .action-btn:hover { background: var(--neon-cyan); color: black; box-shadow: 0 0 15px var(--neon-cyan); }
        
        .cyber-check { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.7rem; color: var(--text-primary); margin-top: 5px; }
        .cyber-check input { width: auto; margin: 0; }

        /* Routine Blocks */
        .routine-block { border: 1px solid var(--neon-cyan); background: rgba(0, 10, 20, 0.6); margin-bottom: 20px; padding: 15px; }
        .block-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--neon-dim); padding-bottom: 10px; margin-bottom: 15px; }
        .block-title { font-weight: bold; color: var(--neon-cyan); font-size: 1rem; display: flex; gap: 15px; align-items: center; }
        
        /* Draggable / Orderable Items */
        .prod-item { display: flex; justify-content: space-between; align-items: center; background: #050505; border-left: 2px solid var(--neon-dim); padding: 10px; margin-bottom: 8px; }
        .prod-info { flex: 1; }
        .prod-name { font-weight: bold; font-size: 0.8rem; color: #fff; }
        .prod-meta { font-size: 0.6rem; color: var(--text-dim); margin-top: 4px; letter-spacing: 1px; }
        .reorder-controls { display: flex; flex-direction: column; gap: 2px; margin-left: 15px; }
        .btn-order { background: none; border: 1px solid var(--neon-dim); color: var(--text-dim); cursor: pointer; font-size: 0.5rem; padding: 2px 6px; }
        .btn-order:hover { background: var(--neon-cyan); color: black; border-color: var(--neon-cyan); }

        .freq-badge { background: rgba(0,229,255,0.1); color: var(--neon-cyan); padding: 2px 6px; border-radius: 2px; font-size: 0.5rem; font-weight: bold; border: 1px solid var(--neon-dim); }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-dim); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>SYS_HEALTH // HYGIENE_PROTOCOLS</h1>
        <button class="btn-return" onclick="window.parent.closeApp()">◄ TERMINATE_LINK</button>
    </header>

    <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('routine')">01_ACTIVE_PROTOCOL</button>
        <button class="tab-btn" onclick="switchTab('inventory')">02_INVENTORY_DATABASE</button>
        <button class="tab-btn" onclick="switchTab('presets')">03_ARCHIVE_PRESETS</button>
    </div>

    <div id="routine" class="tab-content active">
        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px;">
            <h2>CURRENT_DEPLOYMENT_SCHEDULE</h2>
            <button class="action-btn" style="width: auto; margin: 0;" onclick="addRoutineBlock()">+ ADD_TIME_BLOCK</button>
        </div>

        <div id="routineContainer">
            <p style="font-size:0.7rem; color:var(--text-dim); text-align:center;">[ NO ACTIVE BLOCKS DETECTED ]</p>
        </div>
    </div>

    <div id="inventory" class="tab-content" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div class="panel" style="margin: 0; align-self: start;">
            <h2>LOG_NEW_PRODUCT</h2>
            
            <label>PRODUCT_IDENTIFIER (Brand/Name):</label>
            <input type="text" id="invName" placeholder="e.g. Cerave Hydrating Cleanser">

            <div class="flex-row">
                <div style="flex: 1;">
                    <label>CLASSIFICATION:</label>
                    <select id="invType">
                        <option value="FACE">FACE / SKINCARE</option>
                        <option value="HAIR">HAIRCARE</option>
                        <option value="BODY">BODY</option>
                        <option value="ORAL">ORAL HYGIENE</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label>VOLUME / AMOUNT:</label>
                    <div style="display: flex; gap: 5px;">
                        <input type="number" id="invVol" placeholder="0" style="flex: 2;">
                        <select id="invUnit" style="flex: 1; padding: 8px;">
                            <option value="FL OZ">OZ</option>
                            <option value="ML">ML</option>
                        </select>
                    </div>
                </div>
            </div>

            <label>APPLICATION_FREQUENCY:</label>
            <select id="invFreq" onchange="toggleFreqInputs()">
                <option value="DAILY">DAILY (Every Day)</option>
                <option value="WEEKLY">SPECIFIC DAYS (Weekly)</option>
                <option value="MONTHLY">OCCASIONAL (Monthly/Quarterly)</option>
            </select>

            <div id="freqWeekly" style="display: none; background: #000; border: 1px solid var(--neon-dim); padding: 10px; margin-top: 5px;">
                <label style="margin-top: 0;">SELECT_DAYS:</label>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <label class="cyber-check"><input type="checkbox" value="MON"> M</label>
                    <label class="cyber-check"><input type="checkbox" value="TUE"> T</label>
                    <label class="cyber-check"><input type="checkbox" value="WED"> W</label>
                    <label class="cyber-check"><input type="checkbox" value="THU"> TH</label>
                    <label class="cyber-check"><input type="checkbox" value="FRI"> F</label>
                    <label class="cyber-check"><input type="checkbox" value="SAT"> S</label>
                    <label class="cyber-check"><input type="checkbox" value="SUN"> SU</label>
                </div>
            </div>

            <div id="freqMonthly" style="display: none; background: #000; border: 1px solid var(--neon-dim); padding: 10px; margin-top: 5px;">
                <label style="margin-top: 0;">SPECIFY_DATES (Comma Separated):</label>
                <input type="text" id="invMonthlyDates" placeholder="e.g. 1, 15 (For 1st and 15th)">
            </div>

            <button class="action-btn" style="border-color: var(--neon-success); color: var(--neon-success);" onclick="saveToInventory()">COMMIT_TO_INVENTORY</button>
        </div>

        <div class="panel" style="margin: 0; max-height: 500px; overflow-y: auto;">
            <h2>SUPPLY_ARCHIVE</h2>
            <div id="inventoryList">
                </div>
        </div>
    </div>

    <div id="presets" class="tab-content">
        <h2>ARCHIVE_MANAGEMENT</h2>
        <div class="panel">
            <label>CURRENT_CONFIGURATION_STATE:</label>
            <input type="text" id="presetName" placeholder="NAME_PRESET (e.g. WINTER_SKINCARE_V1)">
            <button class="action-btn" onclick="savePreset()">SAVE_AS_NEW_PRESET</button>
        </div>
        <div class="panel">
            <label>STORED_PRESETS:</label>
            <select id="presetList">
                <option value="">NO_PRESETS_FOUND</option>
            </select>
            <button class="action-btn" style="border-color: var(--neon-warn); color: var(--neon-warn);" onclick="loadPreset()">LOAD_SELECTED_PRESET</button>
        </div>
    </div>

</div>

<script>
    // --- STATE MANAGEMENT ---
    let inventoryDB = JSON.parse(localStorage.getItem('wos_hygiene_inv')) || [];
    let activeRoutine = JSON.parse(localStorage.getItem('wos_hygiene_routine')) || [];

    // --- TAB LOGIC ---
    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');

        if(tabId === 'inventory') renderInventory();
        if(tabId === 'routine') renderRoutine();
        if(tabId === 'presets') renderPresets();
    }

    // --- TAB 2: INVENTORY DATABASE ---
    function toggleFreqInputs() {
        const type = document.getElementById('invFreq').value;
        document.getElementById('freqWeekly').style.display = type === 'WEEKLY' ? 'block' : 'none';
        document.getElementById('freqMonthly').style.display = type === 'MONTHLY' ? 'block' : 'none';
    }

    function saveToInventory() {
        const name = document.getElementById('invName').value.trim();
        if (!name) return alert("SYS_ERROR: PRODUCT_IDENTIFIER REQUIRED.");

        const type = document.getElementById('invType').value;
        const freqType = document.getElementById('invFreq').value;
        let freqData = "";

        if (freqType === 'WEEKLY') {
            const days = Array.from(document.querySelectorAll('#freqWeekly input:checked')).map(cb => cb.value);
            freqData = days.join(", ");
        } else if (freqType === 'MONTHLY') {
            freqData = "DAYS: " + document.getElementById('invMonthlyDates').value;
        }

        const product = {
            id: Date.now().toString(),
            name, type,
            volume: `${document.getElementById('invVol').value} ${document.getElementById('invUnit').value}`,
            freqType, freqData
        };

        inventoryDB.push(product);
        localStorage.setItem('wos_hygiene_inv', JSON.stringify(inventoryDB));
        
        // Reset
        document.getElementById('invName').value = "";
        document.getElementById('invVol').value = "";
        renderInventory();
    }

    function renderInventory() {
        const list = document.getElementById('inventoryList');
        list.innerHTML = "";
        if (inventoryDB.length === 0) return list.innerHTML = `<p style="font-size:0.7rem; color:var(--text-dim); text-align:center;">[ INVENTORY EMPTY ]</p>`;

        inventoryDB.forEach(prod => {
            const freqStr = prod.freqType === 'DAILY' ? 'DAILY' : `${prod.freqType} (${prod.freqData})`;
            list.innerHTML += `
                <div style="border-left: 2px solid var(--neon-dim); padding: 10px; margin-bottom: 10px; background: rgba(0,0,0,0.4);">
                    <div style="display:flex; justify-content:space-between;">
                        <span style="font-weight:bold; color:var(--neon-cyan); font-size:0.8rem;">${prod.name}</span>
                        <button onclick="deleteInventory('${prod.id}')" style="background:none; border:none; color:#ff5555; cursor:pointer; font-size:0.6rem;">[ X ]</button>
                    </div>
                    <div style="font-size:0.6rem; color:var(--text-dim); margin-top:4px;">TYPE: ${prod.type} | VOL: ${prod.volume}</div>
                    <div style="font-size:0.6rem; color:var(--text-dim); margin-top:2px;">FREQ: <span class="freq-badge">${freqStr}</span></div>
                </div>
            `;
        });
    }

    function deleteInventory(id) {
        inventoryDB = inventoryDB.filter(p => p.id !== id);
        localStorage.setItem('wos_hygiene_inv', JSON.stringify(inventoryDB));
        
        // Remove from routine if deleted from inventory
        activeRoutine.forEach(block => {
            block.products = block.products.filter(pId => pId !== id);
        });
        saveRoutineState();
        renderInventory();
    }

    // --- TAB 1: ROUTINE BUILDER ---
    function addRoutineBlock() {
        const title = prompt("ENTER_BLOCK_DESIGNATION (e.g. MORNING_PROTOCOL):");
        if(!title) return;
        const time = prompt("ENTER_EXECUTION_TIME (e.g. 07:30):");
        if(!time) return;

        activeRoutine.push({ id: Date.now(), title: title.toUpperCase(), time, products: [] });
        saveRoutineState();
        renderRoutine();
    }

    function assignProduct(blockIndex) {
        if (inventoryDB.length === 0) return alert("SYS_ERROR: INVENTORY EMPTY.");
        
        // Build prompt options
        let options = "SELECT ID TO ASSIGN:\n";
        inventoryDB.forEach((p, i) => options += `[${i}] ${p.name}\n`);
        
        const selection = prompt(options);
        const index = parseInt(selection);
        
        if (!isNaN(index) && inventoryDB[index]) {
            activeRoutine[blockIndex].products.push(inventoryDB[index].id);
            saveRoutineState();
            renderRoutine();
        }
    }

    function moveProduct(blockIndex, prodIndex, direction) {
        const arr = activeRoutine[blockIndex].products;
        if (direction === -1 && prodIndex > 0) {
            // Move Up
            [arr[prodIndex - 1], arr[prodIndex]] = [arr[prodIndex], arr[prodIndex - 1]];
        } else if (direction === 1 && prodIndex < arr.length - 1) {
            // Move Down
            [arr[prodIndex + 1], arr[prodIndex]] = [arr[prodIndex], arr[prodIndex + 1]];
        }
        saveRoutineState();
        renderRoutine();
    }

    function removeProductFromBlock(blockIndex, prodIndex) {
        activeRoutine[blockIndex].products.splice(prodIndex, 1);
        saveRoutineState();
        renderRoutine();
    }

    function deleteBlock(blockIndex) {
        activeRoutine.splice(blockIndex, 1);
        saveRoutineState();
        renderRoutine();
    }

    function saveRoutineState() {
        localStorage.setItem('wos_hygiene_routine', JSON.stringify(activeRoutine));
    }

    function renderRoutine() {
        const container = document.getElementById('routineContainer');
        container.innerHTML = "";
        
        if (activeRoutine.length === 0) {
            container.innerHTML = `<p style="font-size:0.7rem; color:var(--text-dim); text-align:center;">[ NO ACTIVE BLOCKS DETECTED ]</p>`;
            return;
        }

        activeRoutine.forEach((block, bIndex) => {
            let productsHtml = "";
            
            block.products.forEach((prodId, pIndex) => {
                const prod = inventoryDB.find(p => p.id === prodId);
                if (!prod) return; // Skip if deleted from inventory

                const freqStr = prod.freqType === 'DAILY' ? 'DAILY' : `${prod.freqType} (${prod.freqData})`;

                productsHtml += `
                    <div class="prod-item">
                        <div class="prod-info">
                            <div class="prod-name">${pIndex + 1}. ${prod.name}</div>
                            <div class="prod-meta">TYPE: ${prod.type} | <span class="freq-badge">${freqStr}</span></div>
                        </div>
                        <div class="reorder-controls">
                            <button class="btn-order" onclick="moveProduct(${bIndex}, ${pIndex}, -1)">▲</button>
                            <button class="btn-order" onclick="moveProduct(${bIndex}, ${pIndex}, 1)">▼</button>
                        </div>
                        <button onclick="removeProductFromBlock(${bIndex}, ${pIndex})" style="background:none; border:none; color:#ff5555; cursor:pointer; font-size:0.6rem; margin-left:15px;">[ X ]</button>
                    </div>
                `;
            });

            if(block.products.length === 0) {
                productsHtml = `<div style="font-size:0.6rem; color:#555; margin-bottom:10px;">[ NO PRODUCTS ASSIGNED TO BLOCK ]</div>`;
            }

            container.innerHTML += `
                <div class="routine-block">
                    <div class="block-header">
                        <div class="block-title">
                            <span style="color:#fff;">${block.time}</span> // ${block.title}
                        </div>
                        <button onclick="deleteBlock(${bIndex})" style="background:none; border:none; color:#ff5555; cursor:pointer; font-size:0.6rem;">[ DELETE_BLOCK ]</button>
                    </div>
                    
                    <div class="block-products">
                        ${productsHtml}
                    </div>
                    
                    <button class="action-btn" style="border-color:var(--neon-dim); color:var(--text-dim); padding: 6px;" onclick="assignProduct(${bIndex})">+ ASSIGN_INVENTORY_ITEM</button>
                </div>
            `;
        });
    }

    // --- TAB 3: PRESETS ---
    function savePreset() {
        const name = document.getElementById('presetName').value.trim();
        if(!name) return alert("SYS_ERROR: PRESET_NAME REQUIRED.");
        
        let presets = JSON.parse(localStorage.getItem('wos_hygiene_presets')) || {};
        presets[name.toUpperCase()] = activeRoutine;
        localStorage.setItem('wos_hygiene_presets', JSON.stringify(presets));
        
        document.getElementById('presetName').value = "";
        alert("[ ARCHIVED ] Routine saved as preset.");
        renderPresets();
    }

    function loadPreset() {
        const name = document.getElementById('presetList').value;
        if(!name) return;
        
        let presets = JSON.parse(localStorage.getItem('wos_hygiene_presets')) || {};
        activeRoutine = presets[name] || [];
        saveRoutineState();
        alert("[ OVERRIDE ] Preset loaded into Active Protocol.");
    }

    function renderPresets() {
        const select = document.getElementById('presetList');
        let presets = JSON.parse(localStorage.getItem('wos_hygiene_presets')) || {};
        
        select.innerHTML = "";
        const keys = Object.keys(presets);
        
        if(keys.length === 0) {
            select.innerHTML = `<option value="">NO_PRESETS_FOUND</option>`;
            return;
        }
        
        keys.forEach(k => {
            select.innerHTML += `<option value="${k}">${k}</option>`;
        });
    }

    // Init
    renderRoutine();
</script>
</body>
</html>
