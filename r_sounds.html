<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W-OS // AURAL_SYNTHESIS</title>
    <style>
        :root {
            /* Spirit Branch Palette */
            --bg-dark: #0a0212;
            --neon-primary: #b537f2; 
            --neon-glow: #d68aff;
            --text-primary: #f0e6ff; 
            --text-dim: #8b6b99;
            --font-main: 'Courier New', Courier, monospace;
        }

        body { 
            font-family: var(--font-main); background-color: var(--bg-dark); color: var(--text-primary); 
            margin: 0; padding: 20px; overflow-x: hidden;
            background-image: linear-gradient(rgba(10, 2, 18, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                              linear-gradient(90deg, rgba(181, 55, 242, 0.03), rgba(0, 0, 0, 0), rgba(181, 55, 242, 0.03));
            background-size: 100% 3px, 3px 100%; color-scheme: dark;
        }

        /* Auto-Dim Overlay */
        #dim-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; opacity: 0; pointer-events: none;
            transition: opacity 2s ease-in-out; /* Slow, gentle fade */
        }
        .screen-dimmed #dim-overlay { opacity: 0.95; pointer-events: auto; }
        .screen-dimmed .dim-wake-text { opacity: 1; }
        
        .dim-wake-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: var(--text-dim); font-size: 0.8rem; letter-spacing: 4px; opacity: 0;
            transition: opacity 2s; text-align: center;
        }

        .container { 
            max-width: 900px; margin: 0 auto; border: 1px solid var(--neon-primary); 
            background: rgba(10, 2, 18, 0.95); padding: 25px;
            clip-path: polygon(25px 0, 100% 0, 100% calc(100% - 25px), calc(100% - 25px) 100%, 0 100%, 0 25px); 
            position: relative;
        }

        header { border-bottom: 2px solid var(--neon-primary); padding-bottom: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-end; }
        header h1 { margin: 0; font-size: 1.2rem; letter-spacing: 4px; color: var(--neon-primary); }

        .btn-return { background: none; border: 1px solid var(--neon-primary); color: var(--neon-primary); padding: 5px 15px; cursor: pointer; font-family: inherit; font-size: 0.7rem; font-weight: bold; clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px); transition: 0.3s; }
        .btn-return:hover { background: var(--neon-primary); color: black; box-shadow: 0 0 15px var(--neon-primary); }

        /* Top Settings Bar */
        .settings-bar { display: flex; justify-content: flex-end; gap: 15px; margin-bottom: 20px; font-size: 0.7rem; color: var(--text-dim); align-items: center;}
        select, input[type="number"] { background: #000; border: 1px solid var(--text-dim); color: #fff; padding: 5px; font-family: inherit; font-size: 0.7rem; outline: none; }
        select:focus { border-color: var(--neon-glow); }
        .cyber-check { display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .cyber-check input { accent-color: var(--neon-primary); }

        /* Category Rolls */
        .category-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .cat-btn { flex: 1; padding: 12px; background: rgba(0,0,0,0.6); border: 1px solid var(--text-dim); color: var(--text-dim); font-family: inherit; font-size: 0.8rem; font-weight: bold; letter-spacing: 2px; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .cat-btn:hover { border-color: var(--neon-glow); color: var(--neon-glow); }
        .cat-btn.active { background: rgba(181, 55, 242, 0.15); border-color: var(--neon-primary); color: #fff; box-shadow: inset 0 0 15px rgba(181, 55, 242, 0.3); }

        /* Film Roll Viewer */
        .film-viewer { 
            position: relative; width: 100%; height: 180px; background: #000; 
            border-top: 15px solid #111; border-bottom: 15px solid #111;
            /* Film Sprockets Effect */
            background-image: repeating-linear-gradient(90deg, transparent, transparent 15px, #000 15px, #000 25px),
                              repeating-linear-gradient(90deg, transparent, transparent 15px, #000 15px, #000 25px);
            background-position: top, bottom; background-size: 100% 15px, 100% 15px; background-repeat: no-repeat;
            display: flex; align-items: center; overflow: hidden; box-shadow: inset 0 0 50px #000;
        }

        .film-track { display: flex; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); align-items: center; padding-left: 50%; }
        
        .film-frame { 
            width: 120px; height: 120px; background: rgba(10, 2, 18, 0.8); border: 2px solid #333; margin-left: -60px; margin-right: 20px;
            display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.4s;
            opacity: 0.3; transform: scale(0.8); filter: grayscale(100%);
        }
        
        .film-frame.active { 
            opacity: 1; transform: scale(1.2); filter: grayscale(0%);
            border-color: var(--neon-primary); box-shadow: 0 0 20px rgba(181, 55, 242, 0.4); z-index: 10;
        }
        
        .frame-icon { font-size: 2.5rem; margin-bottom: 5px; text-shadow: 0 0 10px var(--neon-glow); }
        .frame-title { font-size: 0.5rem; text-align: center; color: #fff; font-weight: bold; letter-spacing: 1px; }

        .roll-nav { position: absolute; top: 50%; transform: translateY(-50%); width: 40px; height: 80px; background: rgba(0,0,0,0.8); border: 1px solid var(--neon-primary); color: var(--neon-primary); font-size: 1.5rem; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 20; transition: 0.3s; }
        .roll-nav:hover { background: var(--neon-primary); color: #000; box-shadow: 0 0 15px var(--neon-primary); }
        .roll-left { left: 10px; clip-path: polygon(10px 0, 100% 0, 100% 100%, 10px 100%, 0 50%); }
        .roll-right { right: 10px; clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 50%, calc(100% - 10px) 100%, 0 100%); }

        /* Playback Controls */
        .mixer-board { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .channel { border: 1px solid var(--neon-dim); background: rgba(0,0,0,0.5); padding: 15px; position: relative; }
        .channel-title { font-size: 0.7rem; color: var(--text-dim); letter-spacing: 2px; border-bottom: 1px dashed var(--neon-dim); padding-bottom: 5px; margin-bottom: 15px; display: flex; justify-content: space-between;}
        
        .track-readout { font-size: 1rem; color: var(--neon-glow); font-weight: bold; letter-spacing: 2px; text-align: center; margin-bottom: 15px; text-shadow: 0 0 10px var(--neon-primary); min-height: 20px;}

        .control-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 10px;}
        .action-btn { background: rgba(0,0,0,0.6); border: 1px solid var(--neon-primary); color: var(--neon-primary); padding: 8px 15px; cursor: pointer; font-family: inherit; font-size: 0.7rem; font-weight: bold; transition: 0.3s; text-transform: uppercase; letter-spacing: 2px; flex: 1; text-align: center;}
        .action-btn:hover { background: var(--neon-primary); color: black; box-shadow: 0 0 15px var(--neon-primary); }
        
        /* Sliders */
        .slider-group { display: flex; align-items: center; gap: 10px; font-size: 0.7rem; color: var(--text-dim); width: 100%; margin-top: 10px;}
        input[type=range] { -webkit-appearance: none; flex: 1; background: transparent; padding: 0; border: none; height: 20px;}
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 8px; background: var(--neon-glow); cursor: pointer; box-shadow: 0 0 8px var(--neon-glow); margin-top: -6px; border-radius: 2px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: var(--text-dim); }

        .global-controls { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .btn-shuffle { border-color: var(--neon-warn); color: var(--neon-warn); }
        .btn-shuffle:hover { background: var(--neon-warn); color: black; box-shadow: 0 0 15px var(--neon-warn); }
        .btn-stop-all { border-color: var(--neon-red); color: var(--neon-red); }
        .btn-stop-all:hover { background: var(--neon-red); color: black; box-shadow: 0 0 15px var(--neon-red); }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--text-dim); }
    </style>
</head>
<body>

<div id="dim-overlay" onclick="wakeScreen()">
    <div class="dim-wake-text">[ UPLINK_SLEEPING // TAP_TO_WAKE ]</div>
</div>

<div class="container">
    <header>
        <h1>SYS_SPIRIT // AURAL_SYNTHESIS</h1>
        <button class="btn-return" onclick="window.parent.closeApp()">◄ TERMINATE</button>
    </header>

    <div class="settings-bar">
        <label class="cyber-check" title="Dims the screen after inactivity to preserve circadian rhythm">
            <input type="checkbox" id="cfgAutoDim" checked onchange="resetDimTimer()"> AUTO_DIM_DISPLAY
        </label>
        <select id="cfgDimTime" onchange="resetDimTimer()">
            <option value="30000">TIMEOUT: 30s</option>
            <option value="45000" selected>TIMEOUT: 45s</option>
            <option value="60000">TIMEOUT: 60s</option>
        </select>
        
        <div style="width: 1px; height: 15px; background: var(--text-dim); margin: 0 10px;"></div>

        <label>SLEEP_TIMER:</label>
        <select id="cfgTimer" onchange="setGlobalTimer()">
            <option value="0">CONTINUOUS_LOOP</option>
            <option value="15">15 MINUTES</option>
            <option value="30">30 MINUTES</option>
            <option value="60">1 HOUR</option>
            <option value="120">2 HOURS</option>
            <option value="180">3 HOURS</option>
            <option value="240">4 HOURS</option>
            <option value="300">5 HOURS</option>
            <option value="480">8 HOURS</option>
            <option value="600">10 HOURS</option>
        </select>
        <div id="timerDisplay" style="color: var(--neon-warn); font-weight: bold; min-width: 65px; text-align: right;">--:--</div>
    </div>

    <div class="category-row">
        <button class="cat-btn active" onclick="loadCategory('nature', this)">NATURE_SCAPES</button>
        <button class="cat-btn" onclick="loadCategory('appliances', this)">APPLIANCES</button>
        <button class="cat-btn" onclick="loadCategory('music', this)">AMBIENT_SYNTH</button>
    </div>

    <div class="film-viewer">
        <button class="roll-nav roll-left" onclick="shiftRoll(-1)">◄</button>
        
        <div class="film-track" id="filmTrack">
            </div>

        <button class="roll-nav roll-right" onclick="shiftRoll(1)">►</button>
    </div>

    <div class="mixer-board">
        <div class="channel" id="chA">
            <div class="channel-title">CHANNEL_A // PRIMARY <span id="statA">IDLE</span></div>
            <div class="track-readout" id="readoutA">NO_TRACK_SELECTED</div>
            
            <div class="control-row">
                <button class="action-btn" onclick="loadToChannel('A')">LOAD_TO_CH_A</button>
                <button class="action-btn" id="btnPlayA" onclick="togglePlay('A')" style="flex: 0.5;">▶</button>
            </div>
            
            <div class="slider-group">
                <span>VOL</span>
                <input type="range" id="volA" min="0" max="1" step="0.05" value="1" oninput="updateAudio('A')">
            </div>
            <div class="slider-group">
                <span>SPD</span>
                <input type="range" id="spdA" min="0.5" max="1.5" step="0.1" value="1" oninput="updateAudio('A')">
                <span id="spdDisplayA" style="width:25px; text-align:right;">1.0x</span>
            </div>
        </div>

        <div class="channel" id="chB">
            <div class="channel-title">CHANNEL_B // SYNTHESIS (MERGE) <span id="statB">IDLE</span></div>
            <div class="track-readout" id="readoutB" style="color: var(--text-dim);">NO_TRACK_SELECTED</div>
            
            <div class="control-row">
                <button class="action-btn" style="border-color: var(--text-dim); color: var(--text-dim);" onclick="loadToChannel('B')">MERGE_TO_CH_B</button>
                <button class="action-btn" id="btnPlayB" onclick="togglePlay('B')" style="flex: 0.5; border-color: var(--text-dim); color: var(--text-dim);">▶</button>
            </div>
            
            <div class="slider-group">
                <span>VOL</span>
                <input type="range" id="volB" min="0" max="1" step="0.05" value="0.5" oninput="updateAudio('B')">
            </div>
            <div class="slider-group">
                <span>SPD</span>
                <input type="range" id="spdB" min="0.5" max="1.5" step="0.1" value="1" oninput="updateAudio('B')">
                <span id="spdDisplayB" style="width:25px; text-align:right;">1.0x</span>
            </div>
        </div>
    </div>

    <div class="global-controls">
        <button class="action-btn btn-shuffle" onclick="shufflePlay()" style="max-width: 200px;">🎲 SHUFFLE_MATRIX</button>
        <button class="action-btn btn-stop-all" onclick="stopAll()" style="max-width: 200px;">◼ HALT_ALL_FREQUENCIES</button>
    </div>

    <audio id="audioA" loop></audio>
    <audio id="audioB" loop></audio>

</div>

<script>
    // --- DATABASE (Mock Audio Sources) ---
    const library = {
        nature: [
            { id: 'n1', title: 'HEAVY_RAIN', icon: '🌧️', file: 'assets/audio/rain.mp3' },
            { id: 'n2', title: 'THUNDERSTORM', icon: '⛈️', file: 'assets/audio/thunder.mp3' },
            { id: 'n3', title: 'OCEAN_WAVES', icon: '🌊', file: 'assets/audio/waves.mp3' },
            { id: 'n4', title: 'WINTER_WIND', icon: '🌬️', file: 'assets/audio/wind.mp3' },
            { id: 'n5', title: 'NIGHT_FOREST', icon: '🌲', file: 'assets/audio/forest.mp3' }
        ],
        appliances: [
            { id: 'a1', title: 'OSCILLATING_FAN', icon: '🌀', file: 'assets/audio/fan.mp3' },
            { id: 'a2', title: 'HVAC_UNIT', icon: '❄️', file: 'assets/audio/ac.mp3' },
            { id: 'a3', title: 'WHITE_NOISE', icon: '📻', file: 'assets/audio/white_noise.mp3' },
            { id: 'a4', title: 'BROWN_NOISE', icon: '🟫', file: 'assets/audio/brown_noise.mp3' },
            { id: 'a5', title: 'SPACE_HEATER', icon: '🔥', file: 'assets/audio/heater.mp3' }
        ],
        music: [
            { id: 'm1', title: 'BINAURAL_432HZ', icon: '🧠', file: 'assets/audio/binaural_432.mp3' },
            { id: 'm2', title: 'TIBETAN_BOWLS', icon: '🥣', file: 'assets/audio/singing_bowls.mp3' },
            { id: 'm3', title: 'DEEP_DRONE', icon: '🎹', file: 'assets/audio/drone.mp3' },
            { id: 'm4', title: 'WIND_CHIMES', icon: '🎐', file: 'assets/audio/chimes.mp3' },
            { id: 'm5', title: 'CELESTIAL_PAD', icon: '✨', file: 'assets/audio/celestial.mp3' }
        ]
    };

    // --- FILM ROLL ENGINE ---
    let currentCategory = 'nature';
    let currentRollIndex = 0;
    const FRAME_WIDTH = 140; // 120px width + 20px margin

    function loadCategory(cat, btnElement) {
        currentCategory = cat;
        currentRollIndex = 0;
        
        // Update Tabs
        if(btnElement) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
        }

        const track = document.getElementById('filmTrack');
        track.innerHTML = "";
        
        library[cat].forEach((item, index) => {
            track.innerHTML += `
                <div class="film-frame ${index === 0 ? 'active' : ''}" id="frame-${index}" onclick="jumpToFrame(${index})">
                    <div class="frame-icon">${item.icon}</div>
                    <div class="frame-title">${item.title}</div>
                </div>
            `;
        });

        updateRollPosition();
    }

    function shiftRoll(dir) {
        const max = library[currentCategory].length - 1;
        currentRollIndex += dir;
        if(currentRollIndex < 0) currentRollIndex = max;
        if(currentRollIndex > max) currentRollIndex = 0;
        updateRollPosition();
    }

    function jumpToFrame(index) {
        currentRollIndex = index;
        updateRollPosition();
    }

    function updateRollPosition() {
        const track = document.getElementById('filmTrack');
        // Calculate translation to keep the active frame centered
        // Padding-left is 50%, so we just shift left by index * FRAME_WIDTH
        const shift = -(currentRollIndex * FRAME_WIDTH);
        track.style.transform = `translateX(${shift}px)`;

        document.querySelectorAll('.film-frame').forEach((f, i) => {
            f.classList.toggle('active', i === currentRollIndex);
        });
    }

    // --- AUDIO MIXER ENGINE ---
    const players = {
        A: { audio: document.getElementById('audioA'), activeTrack: null },
        B: { audio: document.getElementById('audioB'), activeTrack: null }
    };

    function loadToChannel(ch) {
        const selectedTrack = library[currentCategory][currentRollIndex];
        players[ch].activeTrack = selectedTrack;
        
        document.getElementById(`readout${ch}`).innerText = selectedTrack.title;
        players[ch].audio.src = selectedTrack.file;
        
        // Aesthetic update for Channel B to make it look "active"
        if(ch === 'B') {
            document.getElementById('readoutB').style.color = "var(--neon-glow)";
            document.getElementById('btnPlayB').style.borderColor = "var(--neon-primary)";
            document.getElementById('btnPlayB').style.color = "var(--neon-primary)";
        }

        // Auto-play on load
        players[ch].audio.play().catch(e => console.log("Audio mock play triggered."));
        document.getElementById(`btnPlay${ch}`).innerText = "◼";
        document.getElementById(`stat${ch}`).innerText = "PLAYING";
        
        updateAudio(ch);
        startGlobalTimer();
    }

    function togglePlay(ch) {
        if(!players[ch].activeTrack) return;
        const aud = players[ch].audio;
        const btn = document.getElementById(`btnPlay${ch}`);
        const stat = document.getElementById(`stat${ch}`);

        if(aud.paused) {
            aud.play().catch(e=>{});
            btn.innerText = "◼";
            stat.innerText = "PLAYING";
            startGlobalTimer(); // Ensure timer runs if resuming
        } else {
            aud.pause();
            btn.innerText = "▶";
            stat.innerText = "PAUSED";
        }
    }

    function updateAudio(ch) {
        const aud = players[ch].audio;
        aud.volume = document.getElementById(`vol${ch}`).value;
        
        const spd = document.getElementById(`spd${ch}`).value;
        aud.playbackRate = spd;
        document.getElementById(`spdDisplay${ch}`).innerText = parseFloat(spd).toFixed(1) + "x";
    }

    function stopAll() {
        ['A', 'B'].forEach(ch => {
            players[ch].audio.pause();
            players[ch].audio.currentTime = 0;
            document.getElementById(`btnPlay${ch}`).innerText = "▶";
            document.getElementById(`stat${ch}`).innerText = "IDLE";
        });
        stopGlobalTimer();
    }

    function shufflePlay() {
        // Pick random category
        const cats = Object.keys(library);
        const randCat = cats[Math.floor(Math.random() * cats.length)];
        
        // Setup UI
        const btnIdx = cats.indexOf(randCat);
        loadCategory(randCat, document.querySelectorAll('.cat-btn')[btnIdx]);
        
        // Pick random track
        const max = library[randCat].length;
        currentRollIndex = Math.floor(Math.random() * max);
        updateRollPosition();

        // Load to A and stop B
        loadToChannel('A');
        players['B'].audio.pause();
        document.getElementById('btnPlayB').innerText = "▶";
        document.getElementById('statB').innerText = "IDLE";
    }

    // --- SLEEP TIMER ENGINE ---
    let sleepTimerInterval = null;
    let timeRemaining = 0;

    function setGlobalTimer() {
        const mins = parseInt(document.getElementById('cfgTimer').value);
        if(mins === 0) {
            stopGlobalTimer();
            document.getElementById('timerDisplay').innerText = "∞";
        } else {
            timeRemaining = mins * 60;
            startGlobalTimer();
        }
    }

    function startGlobalTimer() {
        clearInterval(sleepTimerInterval);
        if(parseInt(document.getElementById('cfgTimer').value) === 0) {
            document.getElementById('timerDisplay').innerText = "∞";
            return;
        }

        updateTimerDisplay();
        sleepTimerInterval = setInterval(() => {
            timeRemaining--;
            updateTimerDisplay();
            
            if(timeRemaining <= 0) {
                stopAll();
                document.getElementById('cfgTimer').value = "0"; // reset to continuous
                document.getElementById('timerDisplay').innerText = "--:--";
            }
        }, 1000);
    }

    function stopGlobalTimer() {
        clearInterval(sleepTimerInterval);
    }

    function updateTimerDisplay() {
        const h = Math.floor(timeRemaining / 3600);
        const m = Math.floor((timeRemaining % 3600) / 60).toString().padStart(2, '0');
        const s = (timeRemaining % 60).toString().padStart(2, '0');
        
        if (h > 0) {
            document.getElementById('timerDisplay').innerText = `${h}:${m}:${s}`;
        } else {
            document.getElementById('timerDisplay').innerText = `${m}:${s}`;
        }
    }

    // --- AUTO-DIM ENGINE ---
    let dimTimer;
    
    function resetDimTimer() {
        clearTimeout(dimTimer);
        document.body.classList.remove('screen-dimmed');
        
        const autoDimEnabled = document.getElementById('cfgAutoDim').checked;
        if (!autoDimEnabled) return;

        const timeoutMs = parseInt(document.getElementById('cfgDimTime').value);
        dimTimer = setTimeout(() => {
            document.body.classList.add('screen-dimmed');
        }, timeoutMs);
    }

    function wakeScreen() {
        document.body.classList.remove('screen-dimmed');
        resetDimTimer();
    }

    // Listen for activity to keep screen awake
    ['mousemove', 'mousedown', 'keydown', 'touchstart'].forEach(evt => {
        window.addEventListener(evt, resetDimTimer);
    });

    // --- BOOT ---
    loadCategory('nature', document.querySelectorAll('.cat-btn')[0]);
    resetDimTimer(); // Start the auto-dim watcher

</script>
</body>
</html>
