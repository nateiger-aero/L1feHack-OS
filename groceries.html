<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W-OS // REQUISITION_LOG</title>
    <style>
        :root {
            --bg-dark: #050505;
            --neon-cyan: #00e5ff;
            --text-primary: #e0faff; 
            --text-dim: #94e2ed;
            --neon-dim: rgba(0, 229, 255, 0.2);
            --font-main: 'Courier New', Courier, monospace;
        }

        body { 
            font-family: var(--font-main); background-color: var(--bg-dark); color: var(--text-primary); 
            margin: 0; padding: 20px;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
        }

        .container { 
            max-width: 950px; margin: 0 auto; 
            border: 1px solid var(--neon-cyan); 
            background: rgba(0, 10, 15, 0.95); 
            clip-path: polygon(25px 0, 100% 0, 100% calc(100% - 25px), calc(100% - 25px) 100%, 0 100%, 0 25px); 
        }

        header { 
            padding: 20px; border-bottom: 2px solid var(--neon-cyan); 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(0, 229, 255, 0.05); 
        }
        header h1 { margin: 0; font-size: 1.1rem; letter-spacing: 4px; color: var(--neon-cyan); }

        .btn-return { 
            background: none; border: 1px solid var(--neon-cyan); color: var(--neon-cyan); 
            padding: 8px 18px; cursor: pointer; font-family: inherit; font-size: 0.7rem; font-weight: bold;
            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px); 
            transition: 0.3s; 
        }
        .btn-return:hover { background: var(--neon-cyan); color: black; box-shadow: 0 0 15px var(--neon-cyan); }

        /* Tabs */
        .tab-nav { display: flex; background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--neon-dim); }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; color: var(--text-dim); cursor: pointer; font-family: inherit; font-size: 0.8rem; font-weight: bold; letter-spacing: 2px; transition: 0.3s; }
        .tab-btn.active { color: var(--neon-cyan); border-bottom: 3px solid var(--neon-cyan); background: rgba(0, 229, 255, 0.1); }

        .tab-content { display: none; padding: 30px; animation: slide-in 0.3s ease-out; }
        .tab-content.active { display: block; }
        @keyframes slide-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Form Components */
        label { display: block; margin-top: 15px; font-size: 0.7rem; color: var(--text-dim); font-weight: bold; }
        .input-row { display: flex; gap: 10px; margin-bottom: 25px; align-items: flex-end; }
        
        input, select { 
            background: #000; border: 1px solid var(--neon-dim); 
            color: #fff; padding: 12px; font-family: inherit; outline: none; font-size: 0.9rem;
        }
        input:focus { border-color: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-dim); }

        /* List Items */
        .list-box { background: rgba(0, 255, 255, 0.02); border: 1px solid var(--neon-dim); padding: 20px; margin-top: 15px; }
        .grocery-item { display: flex; flex-direction: column; border-bottom: 1px solid var(--neon-dim); padding: 15px 0; }
        .item-main { display: flex; justify-content: space-between; align-items: center; }

        .price-chip { font-size: 0.7rem; color: var(--neon-cyan); border: 1px solid var(--neon-cyan); padding: 2px 10px; font-weight: bold; }

        .recurring-options { 
            margin-top: 15px; font-size: 0.7rem; background: rgba(0,0,0,0.5); 
            padding: 12px; display: none; border-left: 3px solid var(--neon-cyan); 
        }

        /* Comparison Display */
        .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px; }
        .deal-card { border: 1px solid var(--neon-dim); padding: 20px; text-align: center; background: rgba(0,0,0,0.3); }
        .deal-card.winner { border-color: var(--neon-cyan); box-shadow: 0 0 20px var(--neon-dim); background: rgba(0, 229, 255, 0.05); }
        .best-deal-tag { font-size: 0.7rem; color: black; background: var(--neon-cyan); padding: 4px 12px; display: inline-block; font-weight: bold; margin-bottom: 15px; }
        
        .action-btn { background: none; border: 1px solid var(--neon-cyan); color: var(--neon-cyan); font-family: inherit; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .action-btn:hover { background: var(--neon-cyan); color: black; box-shadow: 0 0 15px var(--neon-cyan); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>SYS_PROCUREMENT // REQUISITION_LOG</h1>
        <button class="btn-return" onclick="window.parent.closeApp()">◄ TERMINATE_LINK</button>
    </header>

    <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('list')">01_PROCUREMENT_LIST</button>
        <button class="tab-btn" onclick="switchTab('compare')">02_COST_OPTIMIZATION</button>
    </div>

    <div id="list" class="tab-content active">
        <div class="input-row">
            <div style="flex: 2;">
                <label>IDENTIFY_ITEM:</label>
                <input type="text" id="itemName" placeholder="e.g. WHOLE_MILK" style="width: 100%;">
            </div>
            <div style="flex: 1;">
                <label>HISTORICAL_WINDOW:</label>
                <select id="pricePeriod" style="width: 100%;">
                    <option value="1">PAST MONTH</option>
                    <option value="6">PAST 6 MONTHS</option>
                    <option value="12">PAST YEAR</option>
                    <option value="60">PAST 5 YEARS</option>
                </select>
            </div>
            <button class="action-btn" onclick="addItem()" style="padding: 12px 25px;">ADD_ENTRY</button>
        </div>

        <div class="list-box" id="groceryList">
            <p id="empty-msg" style="text-align: center; color: var(--text-dim); font-size: 0.8rem; opacity: 0.5;">[ NO ACTIVE REQUISITIONS ]</p>
        </div>
    </div>

    <div id="compare" class="tab-content">
        <h2>UNIT_PRICE_COMPARISON</h2>
        <div class="input-row">
            <input type="text" id="compName" placeholder="ITEM_IDENTIFIER" style="flex: 2;">
        </div>
        <div class="compare-grid">
            <div class="deal-card">
                <h3>LOCAL_MARKET</h3>
                <label>TOTAL_COST ($):</label><input type="number" id="storePrice" placeholder="0.00" step="0.01">
                <label>VOLUME (oz/qty):</label><input type="number" id="storeUnits" placeholder="1">
            </div>
            <div class="deal-card">
                <h3>VIRTUAL_NETWORK (ONLINE)</h3>
                <label>TOTAL_COST ($):</label><input type="number" id="onlinePrice" placeholder="0.00" step="0.01">
                <label>VOLUME (oz/qty):</label><input type="number" id="onlineUnits" placeholder="1">
            </div>
        </div>
        <button class="action-btn" onclick="compareDeals()" style="width: 100%; margin-top: 25px; padding: 18px; font-size: 1rem; letter-spacing: 5px;">EXECUTE_ANALYSIS</button>
        
        <div id="compareResult" style="margin-top: 25px; text-align: center;"></div>
    </div>
</div>

<script src="groceries-app.js"></script>
</body>
</html>
