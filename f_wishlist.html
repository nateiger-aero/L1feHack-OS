<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W-OS // WISH_LIST</title>
    <style>
        :root {
            /* Body Branch Palette */
            --bg-dark: #010a0f;
            --neon-primary: #00e5ff; 
            --neon-glow: #80f2ff;
            --text-primary: #e0faff; 
            --text-dim: #4da6b3;
            --neon-warn: #f39c12;
            --neon-red: #ff2a2a;
            --font-main: 'Courier New', Courier, monospace;
        }

        body { 
            font-family: var(--font-main); background-color: var(--bg-dark); color: var(--text-primary); 
            margin: 0; padding: 20px; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
            box-sizing: border-box;
            background-image: 
                linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        header { padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--neon-primary); background: rgba(0,0,0,0.8); flex-shrink: 0;}
        header h1 { margin: 0; font-size: 1.2rem; letter-spacing: 3px; color: var(--neon-primary); text-shadow: 0 0 10px var(--neon-primary); text-transform: uppercase; }
        .btn-return { background: none; border: 2px solid var(--neon-primary); color: var(--neon-primary); padding: 5px 15px; cursor: pointer; font-size: 0.8rem; font-weight: bold; border-radius: 5px; transition: 0.3s; text-transform: uppercase;}
        .btn-return:hover { background: var(--neon-primary); color: black; box-shadow: 0 0 15px var(--neon-primary); }

        .layout-grid { flex: 1; display: grid; grid-template-columns: 280px 1fr; gap: 20px; min-height: 0; padding-top: 20px; }

        /* Panels */
        .panel { 
            background: rgba(0, 10, 15, 0.9); border: 1px solid var(--text-dim); 
            border-radius: 10px; display: flex; flex-direction: column; overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
        .panel-header { 
            background: rgba(0, 229, 255, 0.1); border-bottom: 1px solid var(--neon-primary); 
            padding: 10px; font-weight: bold; text-align: center; letter-spacing: 2px; color: var(--neon-glow); font-size: 0.9rem;
        }

        /* Sidebar: List Management */
        .list-selector { padding: 15px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .list-btn { background: #000; border: 1px solid var(--text-dim); color: var(--text-dim); padding: 12px; cursor: pointer; text-align: left; font-family: inherit; font-size: 0.8rem; transition: 0.2s; position: relative;}
        .list-btn:hover { border-color: var(--neon-primary); color: var(--text-primary); }
        .list-btn.active { border-color: var(--neon-primary); background: rgba(0, 229, 255, 0.1); color: var(--neon-primary); font-weight: bold; box-shadow: 0 0 10px rgba(0, 229, 255, 0.2); }
        .list-btn.active::before { content: '>'; position: absolute; left: 4px; }
        
        .list-add-box { border-top: 1px solid var(--text-dim); padding: 15px; display: flex; flex-direction: column; gap: 10px; }

        /* Main Deck: Items */
        .item-deck { flex: 1; display: flex; flex-direction: column; min-height: 0; }
        
        /* Item Form */
        .item-form { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 10px; padding: 15px; background: rgba(0,0,0,0.5); border-bottom: 1px solid var(--text-dim); }
        input { background: #000; border: 1px solid var(--text-dim); color: #fff; padding: 8px; font-family: inherit; outline: none; font-size: 0.8rem; }
        input:focus { border-color: var(--neon-primary); }
        .btn-add-item { background: var(--neon-primary); color: #000; border: none; padding: 0 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.7rem;}

        /* Item List */
        .item-list { flex: 1; overflow-y: auto; padding: 15px; }
        .item-row { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 10px; padding: 10px; border-bottom: 1px dotted #333; align-items: center; }
        .item-row:hover { background: rgba(0, 229, 255, 0.05); }
        .item-main { font-weight: bold; color: var(--text-primary); }
        .item-brand { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; }
        .item-cost { font-weight: bold; color: var(--neon-warn); text-align: right; }
        .btn-del { background: none; border: none; color: var(--text-dim); cursor: pointer; padding: 5px; }
        .btn-del:hover { color: var(--neon-red); }

        /* List Footer Stats */
        .list-footer { background: #000; border-top: 1px solid var(--text-dim); padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .total-label { font-size: 0.7rem; color: var(--text-dim); letter-spacing: 2px; }
        .total-val { font-size: 1.5rem; font-weight: bold; color: var(--neon-primary); text-shadow: 0 0 10px var(--neon-primary); }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--text-dim); }
    </style>
</head>
<body>

<header>
    <h1>SYS_BODY // ASSET_ACQUISITION</h1>
    <button class="btn-return" onclick="window.parent.closeApp()">◄ TERMINATE</button>
</header>

<div class="layout-grid">
    
    <div class="panel">
        <div class="panel-header">REGISTRY_IDENTITIES</div>
        <div class="list-selector" id="listSidebar">
            </div>
        <div class="list-add-box">
            <input type="text" id="newListInput" placeholder="NEW_REGISTRY_NAME...">
            <button class="btn-return" style="width: 100%;" onclick="createNewList()">+ INITIALIZE_LIST</button>
        </div>
    </div>

    <div class="panel item-deck">
        <div class="panel-header" id="currentListHeader">SELECT_REGISTRY</div>
        
        <div class="item-form" id="itemForm" style="display: none;">
            <input type="text" id="itemName" placeholder="ITEM_NAME...">
            <input type="text" id="itemBrand" placeholder="BRAND/MFR...">
            <input type="number" id="itemCost" step="0.01" placeholder="0.00">
            <button class="btn-add-item" onclick="addItem()">COMMIT</button>
        </div>

        <div class="item-list" id="itemList">
            <div style="text-align: center; color: var(--text-dim); padding-top: 50px;">NO_REGISTRY_ACTIVE</div>
        </div>

        <div class="list-footer" id="listFooter" style="display: none;">
            <div class="total-label">ESTIMATED_REQUISITION_COST</div>
            <div class="total-val" id="totalDisplay">$0.00</div>
        </div>
    </div>

</div>

<script>
    // --- DATABASE ---
    const DB_KEY = 'wos_wishlists';
    // Structure: { "Personal Tech": [ {name, brand, cost, id}, ... ], "Pets": [...] }
    let registry = JSON.parse(localStorage.getItem(DB_KEY)) || {};
    let activeList = null;

    // --- INITIALIZATION ---
    function init() {
        // Seed some generic lists if completely empty
        if (Object.keys(registry).length === 0) {
            registry = {
                "PERSONAL_TECH": [
                    { id: 1, name: "OLED Monitor", brand: "Generic", cost: 499.99 },
                    { id: 2, name: "Mechanical Keyboard", brand: "Custom", cost: 150.00 }
                ],
                "HOUSEHOLD": []
            };
            localStorage.setItem(DB_KEY, JSON.stringify(registry));
        }
        renderSidebar();
    }

    // --- SIDEBAR LOGIC ---
    function renderSidebar() {
        const sidebar = document.getElementById('listSidebar');
        sidebar.innerHTML = "";
        
        Object.keys(registry).forEach(listName => {
            const btn = document.createElement('button');
            btn.className = `list-btn ${activeList === listName ? 'active' : ''}`;
            btn.innerText = listName;
            btn.onclick = () => selectList(listName);
            
            // Add a small delete "x" for the list itself
            const del = document.createElement('span');
            del.innerHTML = " &times;";
            del.style.float = "right";
            del.style.color = "var(--neon-red)";
            del.onclick = (e) => { e.stopPropagation(); deleteList(listName); };
            btn.appendChild(del);

            sidebar.appendChild(btn);
        });
    }

    function selectList(name) {
        activeList = name;
        document.getElementById('currentListHeader').innerText = `REGISTRY // ${name}`;
        document.getElementById('itemForm').style.display = "grid";
        document.getElementById('listFooter').style.display = "flex";
        renderSidebar();
        renderItems();
    }

    function createNewList() {
        const input = document.getElementById('newListInput');
        const name = input.value.trim().toUpperCase();
        if (!name) return;
        if (registry[name]) return alert("SYS_ERROR: IDENTITY_EXISTS");

        registry[name] = [];
        save();
        input.value = "";
        renderSidebar();
        selectList(name);
    }

    function deleteList(name) {
        if (!confirm(`CONFIRM: DELETE REGISTRY [${name}]?`)) return;
        delete registry[name];
        if (activeList === name) activeList = null;
        save();
        renderSidebar();
        if (!activeList) {
            document.getElementById('currentListHeader').innerText = "SELECT_REGISTRY";
            document.getElementById('itemForm').style.display = "none";
            document.getElementById('listFooter').style.display = "none";
            document.getElementById('itemList').innerHTML = '<div style="text-align: center; color: var(--text-dim); padding-top: 50px;">NO_REGISTRY_ACTIVE</div>';
        }
    }

    // --- ITEM LOGIC ---
    function renderItems() {
        const listContainer = document.getElementById('itemList');
        listContainer.innerHTML = "";
        let total = 0;

        registry[activeList].forEach(item => {
            total += parseFloat(item.cost || 0);
            const row = document.createElement('div');
            row.className = 'item-row';
            row.innerHTML = `
                <div>
                    <div class="item-main">${item.name}</div>
                    <div class="item-brand">${item.brand}</div>
                </div>
                <div class="item-cost">$${parseFloat(item.cost).toFixed(2)}</div>
                <div></div> <button class="btn-del" onclick="deleteItem(${item.id})">X</button>
            `;
            listContainer.appendChild(row);
        });

        document.getElementById('totalDisplay').innerText = `$${total.toFixed(2)}`;
    }

    function addItem() {
        const name = document.getElementById('itemName').value.trim();
        const brand = document.getElementById('itemBrand').value.trim() || "N/A";
        const cost = parseFloat(document.getElementById('itemCost').value) || 0;

        if (!name) return alert("SYS_ERROR: ITEM_NAME_REQUIRED");

        const newItem = {
            id: Date.now(),
            name,
            brand,
            cost
        };

        registry[activeList].push(newItem);
        save();
        
        // Reset inputs
        document.getElementById('itemName').value = "";
        document.getElementById('itemBrand').value = "";
        document.getElementById('itemCost').value = "";
        
        renderItems();
    }

    function deleteItem(id) {
        registry[activeList] = registry[activeList].filter(i => i.id !== id);
        save();
        renderItems();
    }

    function save() {
        localStorage.setItem(DB_KEY, JSON.stringify(registry));
    }

    // --- BOOT ---
    init();

</script>
</body>
</html>
