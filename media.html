<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W-OS // MEDIA_CENTER</title>
    <style>
        :root {
            /* Default Flavor: LUNA_98 */
            --bg-main: #ece9d8;
            --panel-bg: #f5f5f5;
            --border-light: #fff;
            --border-dark: #aca899;
            --accent: #0055e5;
            --text-main: #000;
            --text-glow: none;
            --vis-color: #0055e5;
            --font-main: 'Tahoma', sans-serif;
            --radius: 5px;
        }

        [data-theme="y2k"] {
            --bg-main: #0a0a0a;
            --panel-bg: #111;
            --border-light: #ff00ff;
            --border-dark: #00ffff;
            --accent: #39ff14;
            --text-main: #fff;
            --text-glow: 0 0 5px var(--accent);
            --vis-color: #ff00ff;
            --font-main: 'Courier New', monospace;
            --radius: 0px;
        }

        [data-theme="hifi"] {
            --bg-main: #2c1b0e; /* Woodgrain dark */
            --panel-bg: #bdc3c7; /* Brushed Aluminum */
            --border-light: #ecf0f1;
            --border-dark: #7f8c8d;
            --accent: #d35400; /* Warm amber light */
            --text-main: #2c3e50;
            --text-glow: none;
            --vis-color: #d35400;
            --font-main: 'Trebuchet MS', sans-serif;
            --radius: 2px;
        }

        body { 
            font-family: var(--font-main); background: var(--bg-main); color: var(--text-main); 
            margin: 0; padding: 15px; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
            box-sizing: border-box; transition: background 0.3s;
        }

        /* 3D Bevel Utility */
        .bevel {
            background: var(--panel-bg);
            border-top: 2px solid var(--border-light);
            border-left: 2px solid var(--border-light);
            border-right: 2px solid var(--border-dark);
            border-bottom: 2px solid var(--border-dark);
            border-radius: var(--radius);
        }
        .bevel-inset {
            background: #000; color: #fff;
            border-top: 2px solid var(--border-dark);
            border-left: 2px solid var(--border-dark);
            border-right: 2px solid var(--border-light);
            border-bottom: 2px solid var(--border-light);
        }

        /* HEADER */
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px; margin-bottom: 10px; }
        header h1 { margin: 0; font-size: 1.2rem; color: var(--accent); text-shadow: var(--text-glow); text-transform: uppercase;}
        .controls-top { display: flex; gap: 10px; align-items: center; }
        select, button { font-family: inherit; font-size: 0.8rem; background: var(--panel-bg); color: var(--text-main); border: 1px solid var(--border-dark); padding: 5px 10px; cursor: pointer; }
        button:active { transform: translateY(1px); }

        .media-container { flex: 1; display: grid; grid-template-columns: 2fr 1fr; grid-template-rows: 1fr auto; gap: 10px; min-height: 0; }

        /* MAIN DISPLAY (Vis/Video) */
        .display-zone { grid-column: 1; grid-row: 1; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        #visualizer { width: 100%; height: 100%; display: block; }
        #videoPlayer { width: 100%; height: 100%; display: none; object-fit: contain; background: #000; }
        
        .now-playing-overlay { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 10px; color: #fff; text-shadow: 1px 1px 0 #000; border: 1px solid var(--accent); pointer-events: none; }
        .np-title { font-size: 1.2rem; font-weight: bold; color: var(--accent); }
        .np-artist { font-size: 0.9rem; }

        /* SIDEBAR (Queue & Lyrics) */
        .sidebar { grid-column: 2; grid-row: 1; display: flex; flex-direction: column; gap: 10px; min-height: 0; }
        
        .queue-box { flex: 1; overflow-y: auto; padding: 5px; font-size: 0.85rem; }
        .q-item { padding: 5px; border-bottom: 1px dashed var(--border-dark); cursor: pointer; }
        .q-item:hover { background: var(--accent); color: #fff; }
        .q-item.active { background: var(--accent); color: #fff; font-weight: bold; }

        .lyrics-box { flex: 1; overflow-y: auto; padding: 10px; font-size: 0.9rem; line-height: 1.6; text-align: center; position: relative; transition: 0.3s; }
        .lyrics-settings { position: absolute; top: 5px; right: 5px; font-size: 1rem; cursor: pointer; opacity: 0.5; }
        .lyrics-settings:hover { opacity: 1; }

        /* THE DECK (Bottom Controls) */
        .deck { grid-column: 1 / -1; grid-row: 2; padding: 15px; display: flex; flex-direction: column; gap: 15px; }

        /* Seek Bar */
        .seek-container { display: flex; align-items: center; gap: 10px; font-size: 0.8rem; font-weight: bold; }
        input[type=range] { -webkit-appearance: none; flex: 1; background: transparent; height: 15px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 15px; width: 10px; background: var(--accent); cursor: pointer; border: 1px solid #000; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: var(--border-dark); border: 1px solid #000; }

        /* Transport & Mix Controls */
        .control-grid { display: grid; grid-template-columns: auto 1fr auto; gap: 20px; align-items: center; }

        .transport-btns { display: flex; gap: 5px; }
        .btn-trans { font-size: 1.2rem; width: 40px; height: 40px; font-weight: bold; }
        .btn-play { color: var(--accent); }

        .eq-section { display: flex; gap: 15px; justify-content: center; align-items: center; font-size: 0.7rem; font-weight: bold;}
        .slider-vert { -webkit-appearance: none; width: 80px; height: 10px; background: transparent; transform: rotate(-90deg); margin: 0 -25px; }
        .slider-vert::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 10px; background: var(--panel-bg); border: 1px solid #000; cursor: pointer; box-shadow: 1px 1px 2px rgba(0,0,0,0.5);}
        .slider-vert::-webkit-slider-runnable-track { width: 100%; height: 4px; background: #000; border: 1px solid var(--border-dark); }
        .eq-label { display: flex; flex-direction: column; align-items: center; gap: 35px; }

        .knob-box { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .knob { width: 30px; height: 30px; border-radius: 50%; background: var(--panel-bg); border: 2px solid var(--border-dark); position: relative; box-shadow: 2px 2px 5px rgba(0,0,0,0.3); }
        .knob::after { content:''; position: absolute; top: 2px; left: 13px; width: 2px; height: 10px; background: var(--accent); }

        .toggles-section { display: flex; flex-direction: column; gap: 5px; font-size: 0.75rem; font-weight: bold; }
        .toggles-section label { display: flex; align-items: center; gap: 5px; cursor: pointer; }

        #powerOverlay { position: absolute; top:0; left:0; width:100%; height:100%; background: #000; z-index: 999; display: flex; justify-content: center; align-items: center; }
        .btn-power { background: var(--bg-main); color: var(--accent); padding: 20px 40px; font-size: 1.5rem; font-weight: bold; border: 2px solid var(--accent); cursor: pointer; font-family: inherit; }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--panel-bg); border-left: 1px solid var(--border-dark); }
        ::-webkit-scrollbar-thumb { background: var(--border-dark); border: 1px solid var(--border-light); }
    </style>
</head>
<body>

<div id="powerOverlay">
    <button class="btn-power bevel" onclick="powerOn()">ENGAGE AUDIO ENGINE</button>
</div>

<header>
    <h1>W-OS // MEDIA_CENTER</h1>
    <div class="controls-top">
        <label>FLAVOR:</label>
        <select id="themeSelect" onchange="changeTheme()">
            <option value="wmp">LUNA_98 (Classic)</option>
            <option value="hifi">SILVERFACE_HIFI (Vintage)</option>
            <option value="y2k">NEO_WINAMP (Cyber)</option>
        </select>
        <button class="btn-return" onclick="window.parent.closeApp()">CLOSE</button>
    </div>
</header>

<div class="media-container">
    
    <div class="display-zone bevel-inset">
        <canvas id="visualizer"></canvas>
        <video id="videoPlayer" src=""></video>
        
        <div class="now-playing-overlay">
            <div class="np-title" id="npTitle">NO_MEDIA_LOADED</div>
            <div class="np-artist" id="npArtist">--</div>
        </div>
    </div>

    <div class="sidebar">
        <div class="queue-box bevel">
            <div style="font-weight: bold; border-bottom: 1px solid var(--border-dark); margin-bottom: 5px;">PLAYLIST / QUEUE</div>
            <div id="playlistContainer">
                </div>
        </div>

        <div class="lyrics-box bevel-inset" id="lyricsBox">
            <span class="lyrics-settings" onclick="cycleLyricsStyle()">⚙️</span>
            <div id="lyricsText" style="margin-top: 15px;">
                [ LYRICS_AWAITING_SYNC ]<br><br>
                Please load media file to initialize optical read.
            </div>
        </div>
    </div>

    <div class="deck bevel">
        
        <div class="seek-container">
            <span id="timeCur">00:00</span>
            <input type="range" id="seekSlider" value="0" step="0.1" oninput="seekAudio()">
            <span id="timeRem">-00:00</span>
            <span id="timeTot">[00:00]</span>
        </div>

        <div class="control-grid">
            
            <div style="display: flex; flex-direction: column; gap: 5px;">
                <div class="transport-btns">
                    <button class="btn-trans bevel" onclick="prevTrack()">⏮</button>
                    <button class="btn-trans bevel btn-play" id="btnPlay" onclick="togglePlay()">▶</button>
                    <button class="btn-trans bevel" onclick="nextTrack()">⏭</button>
                    <button class="btn-trans bevel" onclick="toggleRepeat()" id="btnRep">🔁</button>
                    <button class="btn-trans bevel" onclick="toggleShuffle()" id="btnShuf">🔀</button>
                </div>
                
                <div style="display: flex; gap: 10px; font-size: 0.7rem; font-weight: bold;">
                    <label>SPD: <input type="number" id="playSpd" value="1.0" step="0.1" min="0.5" max="2.0" style="width:40px;" onchange="updateSpeed()"></label>
                    <label>VOL: <input type="range" id="volSlider" value="1" max="1" step="0.05" style="width:60px;" oninput="updateVol()"></label>
                    <label><input type="checkbox" id="muteCheck" onchange="updateVol()"> MUTE</label>
                </div>

                <div style="font-size: 0.7rem; font-weight: bold; display: flex; gap: 5px; align-items: center; margin-top: 5px;">
                    LOOP: 
                    <button class="bevel" style="padding: 2px 5px;" onclick="setLoop('A')" id="btnLoopA">A</button>
                    <button class="bevel" style="padding: 2px 5px;" onclick="setLoop('B')" id="btnLoopB">B</button>
                    <button class="bevel" style="padding: 2px 5px; color: var(--accent-red);" onclick="clearLoop()">X</button>
                </div>
            </div>

            <div class="eq-section">
                <div style="display: flex; gap: 15px; border-right: 2px groove var(--border-dark); padding-right: 15px;">
                    <div class="knob-box">
                        <div class="knob" id="knobBass" style="transform: rotate(0deg);"></div>
                        BASS
                        <input type="range" id="eqBass" min="-15" max="15" value="0" style="width:40px;" oninput="updateEQ()">
                    </div>
                    <div class="knob-box">
                        <div class="knob" id="knobTreb" style="transform: rotate(0deg);"></div>
                        TREB
                        <input type="range" id="eqTreb" min="-15" max="15" value="0" style="width:40px;" oninput="updateEQ()">
                    </div>
                </div>

                <div class="eq-label"><span>+12</span><span>0</span><span>-12</span></div>
                <input type="range" class="slider-vert eq-band" data-freq="60" min="-12" max="12" value="0" oninput="updateEQ()">
                <input type="range" class="slider-vert eq-band" data-freq="230" min="-12" max="12" value="0" oninput="updateEQ()">
                <input type="range" class="slider-vert eq-band" data-freq="910" min="-12" max="12" value="0" oninput="updateEQ()">
                <input type="range" class="slider-vert eq-band" data-freq="3600" min="-12" max="12" value="0" oninput="updateEQ()">
                <input type="range" class="slider-vert eq-band" data-freq="14000" min="-12" max="12" value="0" oninput="updateEQ()">
                
                <select id="eqPreset" onchange="applyEqPreset()" style="margin-left: 10px;">
                    <option value="flat">FLAT</option>
                    <option value="rock">ROCK</option>
                    <option value="pop">POP</option>
                    <option value="electronic">ELECTRONIC</option>
                    <option value="acoustic">ACOUSTIC</option>
                </select>
            </div>

            <div class="toggles-section">
                <label><input type="checkbox" checked> GAPLESS_PLAYBACK</label>
                <label><input type="checkbox"> AUTO_NORMALIZE</label>
                <label><input type="checkbox"> CROSSFADE_MIXING</label>
                <select id="aspectRatio" style="margin-top: 5px;" onchange="updateAspect()">
                    <option value="contain">VIDEO: FIT_SCREEN</option>
                    <option value="cover">VIDEO: FILL_SCREEN</option>
                    <option value="fill">VIDEO: STRETCH</option>
                </select>
            </div>

        </div>
    </div>
</div>

<script>
    // --- STATE & DATA ---
    // Note: Since this is local HTML, place your actual .mp3 or .mp4 files in an assets folder.
    const playlist = [
        { id: 1, title: "Original Mix (Demo)", artist: "Nate", file: "assets/audio/track1.mp3", type: "audio", lyrics: "Growing up is hard to do...\nLost in the digital static...\nSearching for a signal..." },
        { id: 2, title: "Y2K Archives", artist: "Unknown", file: "assets/audio/track2.mp3", type: "audio", lyrics: "[ INSTRUMENTAL ]" },
        { id: 3, title: "Visualizer Test", artist: "System", file: "assets/video/test.mp4", type: "video", lyrics: "[ VIDEO PLAYBACK ACTIVE ]" }
    ];

    let currentTrackIdx = 0;
    let isPlaying = false;
    let repeatMode = 0; // 0: Off, 1: All, 2: One
    let isShuffle = false;
    
    let loopA = -1;
    let loopB = -1;

    // --- DOM ELEMENTS ---
    const audioEl = new Audio();
    const videoEl = document.getElementById('videoPlayer');
    const canvas = document.getElementById('visualizer');
    const ctx = canvas.getContext('2d');
    const seekSlider = document.getElementById('seekSlider');

    // --- WEB AUDIO API ENGINE ---
    let audioCtx, analyser, sourceAudio, sourceVideo;
    let bassFilter, trebFilter;
    let eqFilters = [];

    function powerOn() {
        document.getElementById('powerOverlay').style.display = 'none';
        
        // Initialize Audio Graph
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;

        // Routing: Source -> Bass -> Treb -> EQ Array -> Analyser -> Destination
        sourceAudio = audioCtx.createMediaElementSource(audioEl);
        sourceVideo = audioCtx.createMediaElementSource(videoEl);

        bassFilter = audioCtx.createBiquadFilter();
        bassFilter.type = 'lowshelf'; bassFilter.frequency.value = 200;

        trebFilter = audioCtx.createBiquadFilter();
        trebFilter.type = 'highshelf'; trebFilter.frequency.value = 3000;

        // Graphic EQ Bands
        let lastNode = trebFilter;
        document.querySelectorAll('.eq-band').forEach(band => {
            let filter = audioCtx.createBiquadFilter();
            filter.type = 'peaking';
            filter.frequency.value = parseFloat(band.dataset.freq);
            filter.Q.value = 1.4;
            eqFilters.push(filter);
            
            lastNode.connect(filter);
            lastNode = filter;
        });

        // Connect the chain
        sourceAudio.connect(bassFilter);
        sourceVideo.connect(bassFilter);
        bassFilter.connect(trebFilter);
        lastNode.connect(analyser);
        analyser.connect(audioCtx.destination);

        initPlaylist();
        loadTrack(0);
        visualize();
    }

    // --- PLAYBACK LOGIC ---
    function getActiveMedia() {
        return playlist[currentTrackIdx].type === 'video' ? videoEl : audioEl;
    }

    function loadTrack(idx) {
        currentTrackIdx = idx;
        const track = playlist[idx];
        
        // Stop current
        audioEl.pause(); videoEl.pause();
        audioEl.style.display = 'none'; 
        videoEl.style.display = track.type === 'video' ? 'block' : 'none';
        canvas.style.display = track.type === 'video' ? 'none' : 'block';

        const media = getActiveMedia();
        media.src = track.file;
        media.load();

        // Update UI
        document.getElementById('npTitle').innerText = track.title;
        document.getElementById('npArtist').innerText = track.artist;
        document.getElementById('lyricsText').innerText = track.lyrics || "[ NO LYRICS FOUND ]";
        
        document.querySelectorAll('.q-item').forEach((el, i) => {
            el.classList.toggle('active', i === idx);
        });

        clearLoop();
        if (isPlaying) media.play().catch(e=>console.log("Playback blocked."));
        
        // Attach time listeners
        media.ontimeupdate = updateTime;
        media.onloadedmetadata = () => {
            seekSlider.max = media.duration;
            document.getElementById('timeTot').innerText = `[${formatTime(media.duration)}]`;
        };
        media.onended = handleTrackEnd;
    }

    function togglePlay() {
        const media = getActiveMedia();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        if (media.paused) {
            media.play();
            isPlaying = true;
            document.getElementById('btnPlay').innerText = "⏸";
        } else {
            media.pause();
            isPlaying = false;
            document.getElementById('btnPlay').innerText = "▶";
        }
    }

    function handleTrackEnd() {
        if (repeatMode === 2) { // Repeat One
            getActiveMedia().currentTime = 0;
            getActiveMedia().play();
        } else {
            nextTrack();
        }
    }

    function nextTrack() {
        let nextIdx = currentTrackIdx + 1;
        if (isShuffle) {
            nextIdx = Math.floor(Math.random() * playlist.length);
        } else if (nextIdx >= playlist.length) {
            if (repeatMode === 1) nextIdx = 0; // Repeat All
            else return; // Stop
        }
        loadTrack(nextIdx);
    }

    function prevTrack() {
        if (getActiveMedia().currentTime > 3) {
            getActiveMedia().currentTime = 0; // Restart track if past 3 seconds
        } else {
            let prevIdx = currentTrackIdx - 1;
            if (prevIdx < 0) prevIdx = playlist.length - 1;
            loadTrack(prevIdx);
        }
    }

    // --- TIME & TRANSPORT ---
    function formatTime(secs) {
        if (isNaN(secs)) return "00:00";
        let m = Math.floor(secs / 60).toString().padStart(2, '0');
        let s = Math.floor(secs % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    function updateTime() {
        const media = getActiveMedia();
        seekSlider.value = media.currentTime;
        document.getElementById('timeCur').innerText = formatTime(media.currentTime);
        document.getElementById('timeRem').innerText = "-" + formatTime(media.duration - media.currentTime);

        // A-B Loop Logic
        if (loopA !== -1 && loopB !== -1 && media.currentTime >= loopB) {
            media.currentTime = loopA;
        }
    }

    function seekAudio() {
        getActiveMedia().currentTime = seekSlider.value;
    }

    function updateSpdVol() {
        const media = getActiveMedia();
        media.playbackRate = document.getElementById('playSpd').value;
        media.volume = document.getElementById('muteCheck').checked ? 0 : document.getElementById('volSlider').value;
    }
    const updateSpeed = updateSpdVol;
    const updateVol = updateSpdVol;

    // --- A-B LOOP ---
    function setLoop(point) {
        const t = getActiveMedia().currentTime;
        if (point === 'A') { loopA = t; document.getElementById('btnLoopA').style.background = 'var(--accent)'; }
        if (point === 'B') { loopB = t; document.getElementById('btnLoopB').style.background = 'var(--accent)'; }
    }
    function clearLoop() {
        loopA = -1; loopB = -1;
        document.getElementById('btnLoopA').style.background = 'var(--panel-bg)';
        document.getElementById('btnLoopB').style.background = 'var(--panel-bg)';
    }

    // --- UI TOGGLES ---
    function toggleRepeat() {
        repeatMode = (repeatMode + 1) % 3;
        const btn = document.getElementById('btnRep');
        if(repeatMode===0) btn.style.opacity = '0.5';
        if(repeatMode===1) { btn.style.opacity = '1'; btn.innerText = "🔁"; }
        if(repeatMode===2) btn.innerText = "🔂";
    }
    function toggleShuffle() {
        isShuffle = !isShuffle;
        document.getElementById('btnShuf').style.opacity = isShuffle ? '1' : '0.5';
    }
    function updateAspect() {
        videoEl.style.objectFit = document.getElementById('aspectRatio').value;
    }

    let lyricColors = ['#fff', '#39ff14', '#ff00ff', '#f1c40f'];
    let lColorIdx = 0;
    function cycleLyricsStyle() {
        lColorIdx = (lColorIdx + 1) % lyricColors.length;
        document.getElementById('lyricsText').style.color = lyricColors[lColorIdx];
        document.getElementById('lyricsText').style.fontSize = (lColorIdx % 2 === 0) ? '1.1rem' : '0.9rem';
    }

    // --- EQ & KNOBS ---
    function updateEQ() {
        // Bass & Treb
        const bVal = document.getElementById('eqBass').value;
        const tVal = document.getElementById('eqTreb').value;
        if(bassFilter) bassFilter.gain.value = bVal;
        if(trebFilter) trebFilter.gain.value = tVal;

        // Visual Knob Rotation (value is -15 to 15, rotate -135deg to 135deg)
        document.getElementById('knobBass').style.transform = `rotate(${bVal * 9}deg)`;
        document.getElementById('knobTreb').style.transform = `rotate(${tVal * 9}deg)`;

        // Graphic EQ
        const bands = document.querySelectorAll('.eq-band');
        bands.forEach((band, i) => {
            if(eqFilters[i]) eqFilters[i].gain.value = band.value;
        });
    }

    const presets = {
        flat: [0,0,0,0,0], rock: [5, 3, -2, 4, 6], pop: [-2, 2, 5, 2, -2], electronic: [8, 4, -4, 2, 6], acoustic: [2, 4, 2, 3, 5]
    };
    function applyEqPreset() {
        const p = presets[document.getElementById('eqPreset').value];
        const bands = document.querySelectorAll('.eq-band');
        bands.forEach((band, i) => { band.value = p[i]; });
        updateEQ();
    }

    // --- VISUALIZER ---
    function visualize() {
        requestAnimationFrame(visualize);
        if (playlist[currentTrackIdx].type === 'video') return; // Skip drawing if video is active

        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);
        analyser.getByteFrequencyData(dataArray);

        // Adjust canvas internal resolution
        canvas.width = canvas.clientWidth;
        canvas.height = canvas.clientHeight;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const barWidth = (canvas.width / bufferLength) * 2.5;
        let barHeight;
        let x = 0;

        // Grab the CSS variable for the theme's color
        const themeColor = getComputedStyle(document.body).getPropertyValue('--vis-color').trim() || '#0055e5';

        for (let i = 0; i < bufferLength; i++) {
            barHeight = dataArray[i];
            // Normalize height to canvas
            let h = (barHeight / 255) * canvas.height;
            
            ctx.fillStyle = themeColor;
            ctx.fillRect(x, canvas.height - h, barWidth, h);

            // Draw peak caps
            ctx.fillStyle = '#fff';
            ctx.fillRect(x, canvas.height - h - 2, barWidth, 2);

            x += barWidth + 1;
        }
    }

    // --- INIT ---
    function initPlaylist() {
        const container = document.getElementById('playlistContainer');
        playlist.forEach((track, i) => {
            let el = document.createElement('div');
            el.className = 'q-item';
            el.innerText = `${i+1}. ${track.title} - ${track.artist}`;
            el.onclick = () => loadTrack(i);
            container.appendChild(el);
        });
    }

    function changeTheme() {
        document.body.dataset.theme = document.getElementById('themeSelect').value;
    }

</script>
</body>
