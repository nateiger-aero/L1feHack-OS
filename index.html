<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L1feHack-OS | Neural Audio Interface</title>
    <style>
        :root {
            --bg-dark: #020202;
            --neon-cyan: #00e5ff;
            --neon-green: #39ff14;
            --neon-dim: rgba(0, 229, 255, 0.15);
            --font-main: 'Courier New', Courier, monospace;
            --size-core: 120px;
            --size-sat: 65px;
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg-dark); color: white;
            font-family: var(--font-main); overflow: hidden; height: 100vh;
            background-image: radial-gradient(var(--neon-dim) 1.5px, transparent 1.5px);
            background-size: 60px 60px;
        }

        /* === 1. PRE-BOOT POWER BUTTON === */
        #power-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9000; display: flex; justify-content: center; align-items: center;
        }
        .btn-power {
            background: transparent; border: 2px solid var(--neon-cyan); color: var(--neon-cyan);
            padding: 20px 50px; font-size: 1.5rem; font-family: inherit; font-weight: bold;
            cursor: pointer; letter-spacing: 5px; transition: 0.3s; box-shadow: 0 0 15px rgba(0,229,255,0.2);
        }
        .btn-power:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 30px var(--neon-cyan); }

        /* === 2. THE BOOT ANIMATION SEQUENCE === */
        #boot-sequence {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 8000; display: none; flex-direction: column;
            justify-content: center; align-items: center; perspective: 1000px;
        }

        /* GameCube / PS1 3D Geometry */
        .geo-container {
            position: relative; width: 150px; height: 150px;
            transform-style: preserve-3d;
            animation: spin-morph 4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            opacity: 0;
        }
        .cube-face {
            position: absolute; width: 150px; height: 150px;
            border: 2px solid var(--neon-cyan); background: rgba(0, 229, 255, 0.05);
            box-shadow: inset 0 0 20px rgba(0,229,255,0.2);
        }
        .front  { transform: translateZ(75px); }
        .back   { transform: rotateY(180deg) translateZ(75px); }
        .left   { transform: rotateY(-90deg) translateZ(75px); }
        .right  { transform: rotateY(90deg) translateZ(75px); }
        .top    { transform: rotateX(90deg) translateZ(75px); }
        .bottom { transform: rotateX(-90deg) translateZ(75px); }

        @keyframes spin-morph {
            0% { transform: rotateX(0deg) rotateY(0deg) scale(0.1); opacity: 0; }
            30% { opacity: 1; border-color: var(--neon-cyan); }
            60% { transform: rotateX(720deg) rotateY(360deg) scale(1); border-color: var(--neon-green); border-radius: 0%;}
            100% { transform: rotateX(900deg) rotateY(405deg) scale(0.2); opacity: 0; border-radius: 50%; }
        }

        /* Xbox 360 Energy Sphere */
        .energy-flash {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px; border-radius: 50%;
            background: #fff; transform: translate(-50%, -50%) scale(0);
            box-shadow: 0 0 50px 20px var(--neon-green), 0 0 100px 50px var(--neon-cyan);
            animation: sphere-erupt 2s ease-out 3s forwards;
        }
        @keyframes sphere-erupt {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(100); opacity: 1; background: var(--neon-green); }
            100% { transform: translate(-50%, -50%) scale(150); opacity: 0; }
        }

        /* Windows XP Segmented Loading Bar */
        .xp-loader-wrap {
            position: absolute; bottom: 15%; width: 250px; height: 15px;
            border: 2px solid #555; border-radius: 4px; padding: 2px;
            display: flex; gap: 2px; opacity: 0; animation: fade-in-out 5s linear forwards;
        }
        .xp-segment {
            height: 100%; flex: 1; background: linear-gradient(180deg, #2ecc71, #27ae60);
            opacity: 0; animation: load-segment 0.1s forwards;
        }
        /* Stagger the loading segments */
        .seg-1 { animation-delay: 0.5s; } .seg-2 { animation-delay: 1.0s; } .seg-3 { animation-delay: 1.5s; }
        .seg-4 { animation-delay: 2.0s; } .seg-5 { animation-delay: 2.5s; } .seg-6 { animation-delay: 3.0s; }

        @keyframes load-segment { to { opacity: 1; } }
        @keyframes fade-in-out { 0%, 80% { opacity: 1; } 100% { opacity: 0; } }

        .os-title {
            position: absolute; font-size: 2.5rem; font-weight: bold; letter-spacing: 10px;
            color: #fff; text-shadow: 0 0 20px var(--neon-cyan);
            opacity: 0; animation: title-reveal 3s forwards 3.5s;
        }
        @keyframes title-reveal {
            0% { opacity: 0; transform: scale(0.8); letter-spacing: 20px;}
            50% { opacity: 1; transform: scale(1); letter-spacing: 10px;}
            100% { opacity: 0; transform: scale(1.1); }
        }

        /* === 3. HUB VIEWPORT (Orbit Design) === */
        #hub-viewport { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s; opacity: 0; display: none;}
        .system-container { position: relative; width: 600px; height: 600px; display: flex; justify-content: center; align-items: center; }
        .core-node { width: var(--size-core); height: var(--size-core); border: 2px solid var(--neon-cyan); border-radius: 50%; background: rgba(0,0,0,0.95); box-shadow: 0 0 30px var(--neon-cyan); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; cursor: pointer; transition: 0.3s; }
        .core-node:hover { transform: scale(1.1); box-shadow: 0 0 50px var(--neon-cyan); }
        .orbit-wrapper { position: absolute; width: 100%; height: 100%; animation: rotate-orbit 45s linear infinite; }
        @keyframes rotate-orbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .satellite { position: absolute; width: var(--size-sat); height: var(--size-sat); border: 1px solid var(--neon-cyan); border-radius: 50%; background: rgba(0,10,20,0.95); color: var(--neon-cyan); display: flex; justify-content: center; align-items: center; cursor: pointer; transition: all 0.3s ease; z-index: 110; }
        .satellite:hover { background: var(--neon-cyan); color: black; box-shadow: 0 0 20px var(--neon-cyan); transform: scale(1.2); }
        .sat-label { font-size: 0.5rem; font-weight: bold; text-align: center; animation: counter-rotate 45s linear infinite; }
        @keyframes counter-rotate { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
        .connector { position: absolute; top: 50%; left: 50%; height: 1px; background: linear-gradient(90deg, var(--neon-cyan), transparent); transform-origin: left center; z-index: 50; opacity: 0.3; }
        
        .header-ui { position: fixed; top: 20px; left: 20px; z-index: 200; display: none; }
        .breadcrumb { font-size: 0.6rem; color: var(--neon-cyan); letter-spacing: 2px; text-transform: uppercase; }

        /* === 4. APP OVERLAY === */
        #app-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; display: none; flex-direction: column; }
        .app-bar { background: #000; padding: 10px; border-bottom: 2px solid var(--neon-cyan); display: flex; justify-content: space-between; align-items: center; }
        iframe { flex: 1; border: none; background: #050505;}
    </style>
</head>
<body onclick="playClickSfx()">

    <audio id="sfx-click" src="assets/audio/click.wav"></audio> 
    <audio id="sfx-return" src="assets/audio/return.wav"></audio> 
    <audio id="sfx-loading" src="assets/audio/loading.wav"></audio> 
    <audio id="sfx-boot" src="assets/audio/boot.wav"></audio>
    <audio id="menu-sfx-player"></audio>

    <div id="power-overlay">
        <button class="btn-power" onclick="startBootSequence()">POWER ON</button>
    </div>

    <div id="boot-sequence">
        <div class="geo-container">
            <div class="cube-face front"></div><div class="cube-face back"></div>
            <div class="cube-face left"></div><div class="cube-face right"></div>
            <div class="cube-face top"></div><div class="cube-face bottom"></div>
        </div>
        
        <div class="energy-flash"></div>
        
        <div class="os-title">L1feHack-OS</div>

        <div class="xp-loader-wrap">
            <div class="xp-segment seg-1"></div><div class="xp-segment seg-2"></div><div class="xp-segment seg-3"></div>
            <div class="xp-segment seg-4"></div><div class="xp-segment seg-5"></div><div class="xp-segment seg-6"></div>
        </div>
    </div>

    <div class="header-ui" id="header-ui">
        <div class="breadcrumb" id="breadcrumb">SYSTEM_ROOT</div>
    </div>

    <div id="hub-viewport">
        <div class="system-container" id="system-container"></div>
    </div>

    <div id="app-overlay">
        <div class="app-bar">
            <span style="color: var(--neon-cyan); font-size: 0.7rem; letter-spacing: 2px;">SECURE_DATA_TUNNEL_ESTABLISHED</span>
            <button onclick="closeApp()" style="background:none; border:1px solid var(--neon-cyan); color:var(--neon-cyan); padding:5px 15px; cursor:pointer; font-weight: bold; font-family: inherit;">◄ DISCONNECT</button>
        </div>
        <iframe id="app-frame" src=""></iframe>
    </div>

    <script>
        // --- AUDIO HELPERS ---
        function playSfx(id) {
            const sound = document.getElementById(id);
            if(sound) {
                sound.currentTime = 0;
                sound.play().catch(e => {}); 
            }
        }
        function playClickSfx() { playSfx('sfx-click'); }

        // --- NEW BOOT SEQUENCE LOGIC ---
        // --- NEW BOOT SEQUENCE LOGIC ---
        function startBootSequence() {
            // 1. Hide Power Button & Unlock Audio
            document.getElementById('power-overlay').style.display = 'none';
            playSfx('sfx-boot');

            // --- THE FIX: UNLOCK THE BACKGROUND AUDIO PLAYER ---
            const menuPlayer = document.getElementById('menu-sfx-player');
            menuPlayer.src = menuTracks[0]; // Load a track
            menuPlayer.play().then(() => { 
                menuPlayer.pause(); // Immediately pause it so it's ready for later
            }).catch(e => {});
            // ---------------------------------------------------

            // 2. Show Animation Screen
            const bootScreen = document.getElementById('boot-sequence');
            bootScreen.style.display = 'flex';

            // 3. Wait for the CSS animations to finish (approx 6 seconds), then load the OS
            setTimeout(() => {
                bootScreen.style.display = 'none';
                loadOSHub();
            }, 6000); 
        }

        // --- UPDATED RANDOM AUDIO LOOP ---
        const menuTracks = [
            "assets/audio/menu1.mp3",
            "assets/audio/menu2.mp3",
            "assets/audio/menu3.mp3"
        ];

        function playRandomMenuSfx() {
            const player = document.getElementById('menu-sfx-player');
            
            // Pick a random track from the array
            const randomTrack = menuTracks[Math.floor(Math.random() * menuTracks.length)];
            player.src = randomTrack;
            player.volume = 0.4; // Adjust volume as needed
            
            player.play().catch(e => { 
                console.log("Audio blocked. Retrying in 4 seconds..."); 
                // FAILSAFE: If the browser blocks it, wait 4 seconds and try again 
                // instead of breaking the loop entirely.
                setTimeout(playRandomMenuSfx, 4000);
            });

            // When the track ends, wait 4000 milliseconds (4 seconds), then play again
            player.onended = () => {
                setTimeout(playRandomMenuSfx, 4000);
            };
        }

       function loadOSHub() {
            document.getElementById('header-ui').style.display = 'block';
            const viewport = document.getElementById('hub-viewport');
            viewport.style.display = 'flex';
            
            setTimeout(() => { viewport.style.opacity = '1'; }, 50);
            
            const player = document.getElementById('menu-sfx-player');
            const maxVol = 0.4;
            const fadeDuration = 2.0; // Seconds the fade out will last
            
            // Unmute the track that was playing silently
            player.volume = maxVol; 
            
            // --- NEW: FADE OUT LOGIC ---
            player.ontimeupdate = () => {
                // Check if the track duration is loaded
                if (player.duration) {
                    const timeLeft = player.duration - player.currentTime;
                    // If we are within the last 2 seconds...
                    if (timeLeft <= fadeDuration && timeLeft > 0) {
                        // Smoothly calculate volume down to 0
                        player.volume = Math.max(0, (timeLeft / fadeDuration) * maxVol);
                    }
                }
            };
            
            // Attach the loop logic
            player.onended = () => {
                setTimeout(playRandomMenuSfx, 4000);
            };
            
            renderSystem();
        }

        // --- HIERARCHY DATA MAP ---
        const treeData = {
            "root": { label: "USER", branches: ["stats", "dash", "inventory"], centerClick: "user_core" },
            
            "user_core": { label: "USER_CORE", branches: ["profile", "settings"] },
                "profile": { label: "PROFILE", branches: ["username", "icon", "targets", "records", "p_data"] },
                    "username": { label: "USERNAME", app: "#" },
                    "icon": { label: "ICON", app: "#" },
                    "targets": { label: "TARGETS", app: "#" },
                    "records": { label: "RECORDS", app: "#" },
                    "p_data": { label: "DATA", app: "#" },
                "settings": { label: "SETTINGS", branches: ["preferences", "ui", "sfx"] },
                    "preferences": { label: "PREFS", app: "#" },
                    "ui": { label: "UI_THEME", app: "#" },
                    "sfx": { label: "SFX", app: "#" },

            "stats": { label: "STATS", branches: ["body", "mind", "spirit"] },
            "dash": { label: "DASHBOARD", app: "dashboard.html" },
            "inventory": { label: "INVENTORY", branches: ["finance", "wardrobe", "archive"] },

            "body": { label: "BODY", branches: ["hunger", "strength", "health", "hygiene"] },
            "mind": { label: "MIND", branches: ["todo", "calendar", "timer"] },
            "spirit": { label: "SPIRIT", branches: ["rest", "brain_break", "meditation"] },

            "finance": { label: "FINANCE", branches: ["budget", "goals", "wishlist"] },
            "wardrobe": { label: "WARDROBE", app: "wardrobe.html" },
            "archive": { label: "ARCHIVE", branches: ["a_recipes", "a_workouts", "playlists"] },

            "hunger": { label: "HUNGER", branches: ["recipes", "macros", "groceries"] },
                "recipes": { label: "RECIPES", app: "recipe.html" },
                "macros": { label: "MACROS", app: "macros.html" },
                "groceries": { label: "GROCERIES", app: "groceries.html" },
            
            "strength": { label: "STRENGTH", branches: ["workouts", "activities", "routines"] },
                "workouts": { label: "WORKOUTS", app: "workouts.html" },
                "activities": { label: "ACTIVITIES", app: "activeves.html" },
                "routines": { label: "ROUTINES", app: "routines.html" },

            "health": { label: "HEALTH", branches: ["h_goals", "h_records", "h_progress", "hygiene_sub"] },
                "h_goals": { label: "GOALS", app: "goals.html" },
                "h_records": { label: "RECORDS", app: "records.html" },
                "h_progress": { label: "PROGRESS", app: "progress.html" },
                "hygiene_sub": { label: "HYGIENE", app: "hygiene.html" },

            "hygiene": { label: "HYGIENE", app: "hygiene.html" }, 

            "todo": { label: "TO-DO", app: "todo.html" },
            "calendar": { label: "CALENDAR", app: "calendar.html" },
            "timer": { label: "TIMER", app: "timer.html" },

            "rest": { label: "REST", branches: ["r_target", "r_audit", "r_sounds"] },
                "r_target": { label: "TARGET", app: "r_target.html" },
                "r_audit": { label: "AUDIT", app: "r_audit.html" },
                "r_sounds": { label: "SOUNDS", app: "r_sounds.html" },

            "brain_break": { label: "BRAIN_BREAK", branches: ["bb_trivia", "bb_games", "bb_videos"] },
                "bb_trivia": { label: "TRIVIA", app: "break.html" },
                "bb_games": { label: "GAMES", app: "break.html" },
                "bb_videos": { label: "VIDEOS", app: "break.html" },

            "meditation": { label: "MEDITATION", app: "meditation.html" },

            "budget": { label: "BUDGET", app: "f_budget.html" },
            "goals": { label: "GOALS", app: "f_goals.html" },
            "wishlist": { label: "WISHLIST", app: "f_wishlist.html" },

            "a_recipes": { label: "RECIPES", app: "i_archive.html" },
            "a_workouts": { label: "WORKOUTS", app: "i_archive.html" },
            "playlists": { label: "PLAYLISTS", app: "media.html" }
        };

        let currentLevel = "root";
        let history = [];

        // --- NAVIGATION ENGINE ---
        function renderSystem() {
            const container = document.getElementById('system-container');
            const data = treeData[currentLevel];
            
            let bPath = ["SYSTEM_ROOT"];
            if(history.length > 0) bPath = bPath.concat(history.slice(1).map(h => treeData[h].label));
            if(currentLevel !== "root") bPath.push(data.label);
            document.getElementById('breadcrumb').innerText = bPath.join(" // ");
            
            container.innerHTML = "";

            const core = document.createElement('div');
            core.className = "core-node";
            if (history.length > 0) {
                core.innerHTML = `<span>◄ RETURN</span><div style="font-size:0.5rem;opacity:0.6;margin-top:5px;">${data.label}</div>`;
                core.onclick = (e) => { e.stopPropagation(); goBack(); };
            } else {
                core.innerHTML = `<span>${data.label}</span>`;
                if (data.centerClick) {
                    core.onclick = (e) => { e.stopPropagation(); zoomTransition(data.centerClick); };
                }
            }
            container.appendChild(core);

            if (!data.branches) return;

            const wrapper = document.createElement('div');
            wrapper.className = "orbit-wrapper";
            const angleStep = 360 / data.branches.length;
            const radius = 180;

            data.branches.forEach((branchKey, index) => {
                const branch = treeData[branchKey] || { label: branchKey.toUpperCase() };
                const angle = index * angleStep;
                
                const line = document.createElement('div');
                line.className = "connector";
                line.style.width = `${radius}px`;
                line.style.transform = `rotate(${angle}deg)`;
                wrapper.appendChild(line);

                const sat = document.createElement('div');
                sat.className = "satellite";
                const x = radius * Math.cos(angle * Math.PI / 180);
                const y = radius * Math.sin(angle * Math.PI / 180);
                sat.style.left = `calc(50% + ${x}px - 32.5px)`;
                sat.style.top = `calc(50% + ${y}px - 32.5px)`;
                sat.innerHTML = `<div class="sat-label">${branch.label}</div>`;
                
                sat.onclick = (e) => {
                    e.stopPropagation();
                    if (branch.app) launchApp(branch.app);
                    else zoomTransition(branchKey);
                };
                wrapper.appendChild(sat);
            });
            container.appendChild(wrapper);
        }

        function zoomTransition(nextId) {
            playSfx('sfx-loading');
            const viewport = document.getElementById('hub-viewport');
            viewport.style.transform = "scale(3)";
            viewport.style.opacity = "0";
            setTimeout(() => {
                history.push(currentLevel);
                currentLevel = nextId;
                renderSystem();
                viewport.style.transform = "scale(0.5)";
                setTimeout(() => { viewport.style.opacity = "1"; viewport.style.transform = "scale(1)"; }, 50);
            }, 400);
        }

        function goBack() {
            playSfx('sfx-return');
            const viewport = document.getElementById('hub-viewport');
            viewport.style.transform = "scale(0.2)";
            viewport.style.opacity = "0";
            setTimeout(() => {
                currentLevel = history.pop();
                renderSystem();
                viewport.style.transform = "scale(2)";
                setTimeout(() => { viewport.style.opacity = "1"; viewport.style.transform = "scale(1)"; }, 50);
            }, 400);
        }

        // --- APP LAUNCHER ---
        function launchApp(url) {
            if(url === "#") return alert("SYS_ERROR: MODULE_NOT_COMPILED.");
            playSfx('sfx-loading');
            document.getElementById('app-frame').src = url;
            document.getElementById('app-overlay').style.display = "flex";
        }

        window.closeApp = function() {
            playSfx('sfx-return');
            document.getElementById('app-overlay').style.display = "none";
            document.getElementById('app-frame').src = "";
        }
    </script>
</body>
</html>
